<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5fa;
padding-bottom:40px;
color:#333;
}

/* Navbar */

.navbar{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:999;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.logo-text{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

/* Dashboard */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.stat-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:center;
transition:.3s;
}

.stat-card:hover{
transform:translateY(-5px);
}

.stat-card h3{
color:gray;
margin-bottom:10px;
font-size:15px;
}

.stat-card h1{
color:#2e7d32;
font-size:30px;
}

/* Buttons */

#userBtn,
#addBtn,
.updateBtn,
.closeBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

#userBtn{
margin:20px;
width:calc(100% - 40px);
background:#1976d2;
color:white;
}

#userBtn:hover{
background:#1565c0;
}

#addBtn{
background:#2e7d32;
color:white;
margin-top:20px;
}

#addBtn:hover{
background:#1b5e20;
}

.updateBtn{
background:#2e7d32;
color:white;
}

.closeBtn{
background:#e53935;
color:white;
margin-top:10px;
}

/* Form */

.container{
background:white;
margin:20px;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.container h2{
margin-bottom:20px;
color:#2e7d32;
}

input,
select,
textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:1px solid #ddd;
background:#fafafa;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
border-color:#2e7d32;
background:white;
}

textarea{
height:120px;
resize:none;
}

/* Few Stock */

.stockBox{
display:flex;
align-items:center;
gap:10px;
margin-top:15px;
padding:10px;
background:#f7f7f7;
border-radius:10px;
}

.stockBox input{
width:20px;
height:20px;
}

/* Heading */

.heading,
h2{
margin:20px;
color:#333;
}

/* Products & Orders */

#products,
#allOrders{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

/* Card */

.product-card,
.order-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* Popup */

#statusPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
}

.popup-box{
background:white;
width:100%;
max-width:450px;
max-height:90vh;
overflow:auto;
padding:25px;
border-radius:25px;
animation:popup .3s ease;
}

@keyframes popup{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popup-box h3{
margin-bottom:15px;
color:#2e7d32;
}

.detail{
padding:12px;
margin-top:10px;
border-radius:12px;
background:#f5f7fa;
}

.detail b{
display:block;
margin-bottom:5px;
}

/* Mobile */

@media(max-width:600px){

.logo-text{
font-size:16px;
}

.container{
margin:12px;
padding:18px;
}

.dashboard{
padding:12px;
}

}

</style>

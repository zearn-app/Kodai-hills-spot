<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<nav class="navbar">

<div class="logo-box">

<img src="logo.png" class="logo-img">

<div class="logo-text">

Kodai Hills Spot Admin

</div>

</div>

</nav>


<div class="dashboard">

<div class="stat-card">

<h3>Total Products</h3>

<h1 id="totalProducts">0</h1>

</div>

<div class="stat-card">

<h3>Total Orders</h3>

<h1 id="totalOrders">0</h1>

</div>

</div>

<button id="userBtn">
User
</button>


<div class="container">

<h2>Add Product</h2>

<input
id="name"
placeholder="Product Name">

<input
id="price"
placeholder="Price">

<select id="category">

<option>Chocolate</option>

<option>Honey</option>

<option>Herbs</option>

<option>Oils</option>
<option>fruits</option>

<option> organic products</option>

</select>

<input
id="image"
placeholder="Image URL">

<textarea
id="description"
placeholder="Description">
</textarea>

<button id="addBtn">

Add Product

</button>

</div>


<h2 class="heading">

Products

</h2>

<div id="products">

Loading...

</div>
<h2>

All Orders

</h2>

<div id="allOrders">

</div>

<div id="statusPopup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:1000;
">

<div style="
background:white;
padding:20px;
width:90%;
border-radius:20px;
">

<h3>
Update Order Status
</h3>

<select
id="statusSelect"
style="
width:100%;
padding:12px;
margin-top:15px;
">

<option>Pending</option>

<option>Approved</option>

<option>Delivered</option>

</select>

<input
id="trackingId"
placeholder="Enter Tracking ID"
style="
display:none;
width:100%;
padding:12px;
margin-top:15px;
">

<button
id="updateBtn"
style="
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
">

Update

</button>

<button
onclick="closePopup()"
style="
width:100%;
padding:12px;
margin-top:10px;
background:red;
color:white;
border:none;
border-radius:10px;
">

Close

</button>

</div>

</div>

<script type="module"
src="js/admin.js">


</script>

</body>

</html>

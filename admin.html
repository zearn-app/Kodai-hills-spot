<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:50px;
}

.header{

display:flex;
align-items:center;
gap:10px;

margin-bottom:20px;

}

.logo{

width:60px;
height:60px;

border-radius:50%;

border:2px solid #2e7d32;

}

.title{

font-size:24px;
font-weight:bold;
color:#2e7d32;

}

.container{

background:white;

padding:20px;

border-radius:20px;

box-shadow:0 2px 15px rgba(0,0,0,.1);

}

input,textarea,select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:12px;

border:1px solid #ddd;

}

button{

width:100%;
padding:14px;

border:none;
border-radius:12px;

background:#2e7d32;

color:white;

font-size:16px;

}

.product{

background:white;

padding:15px;

margin-top:15px;

border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.product img{

width:100%;
height:150px;

object-fit:cover;

border-radius:10px;

}

.delete{

background:#e53935;
margin-top:10px;

}

</style>

</head>

<body>


<div class="header">

<img src="assets/logo.png"
class="logo">

<div class="title">

Admin Panel

</div>

</div>


<div class="container">

<input
id="name"
placeholder="Product Name">

<input
id="price"
placeholder="Price">

<select id="category">

<option>
Chocolate
</option>

<option>
Honey
</option>

<option>
Herbs
</option>

<option>
Oils
</option>

</select>

<input
id="image"
placeholder="Image URL">

<textarea
id="description"
placeholder="Description">
</textarea>

<button id="addBtn">

Add Product

</button>

</div>


<h2 style="margin-top:20px">
Products
</h2>

<div id="products">

</div>

<script type="module"
src="js/admin.js">

</script>

</body>
</html>

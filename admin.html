<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Admin</title>

<link rel="stylesheet" href="css/admin.css">

<style>

#statusPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
}

.popup-box{
background:white;
width:100%;
max-height:90vh;
overflow:auto;
padding:20px;
border-radius:20px;
}

.detail{
margin-top:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
}

.popup-box select,
.popup-box input,
.popup-box button,
textarea{

width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:none;
}

.stockBox{
display:flex;
align-items:center;
margin-top:15px;
gap:10px;
}

.stockBox input{
width:auto;
}

.updateBtn{
background:#2e7d32;
color:white;
}

.closeBtn{
background:red;
color:white;
}

/* Category Manager */
.category-manager {
  background: white;
  border-radius: 15px;
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
}

.category-manager h3 {
  margin: 0 0 14px 0;
  font-size: 16px;
  color: #1a1a1a;
}

.category-add-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.category-add-row input {
  flex: 1 !important;
  width: auto !important;
  padding: 10px 14px !important;
  border: 1.5px solid #e0e0e0 !important;
  border-radius: 10px !important;
  font-size: 14px !important;
  outline: none !important;
  margin-top: 0 !important;
}

.category-add-row input:focus {
  border-color: #2e7d32 !important;
}

.category-add-row button {
  width: auto !important;
  padding: 10px 16px !important;
  background: #2e7d32 !important;
  color: white !important;
  border: none !important;
  border-radius: 10px !important;
  font-size: 14px !important;
  font-weight: 600 !important;
  cursor: pointer !important;
  white-space: nowrap !important;
  margin-top: 0 !important;
  flex-shrink: 0 !important;
}

.category-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.category-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: #f0f7f0;
  border: 1.5px solid #c8e6c9;
  border-radius: 20px;
  font-size: 13px;
  color: #2e7d32;
  font-weight: 500;
}

.category-chip .chip-delete {
  background: none;
  border: none;
  color: #c62828;
  font-size: 15px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  font-weight: 700;
}

.category-chip.builtin {
  background: #f5f5f5;
  border-color: #e0e0e0;
  color: #888;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo-box">

<img src="logo.png" class="logo-img">

<div class="logo-text">
Kodai Hills Spot Admin
</div>

</div>

</nav>


<div class="dashboard">

<div class="stat-card">
<h3>Total Products</h3>
<h1 id="totalProducts">0</h1>
</div>

<div class="stat-card">
<h3>Total Orders</h3>
<h1 id="totalOrders">0</h1>
</div>

</div>


<button id="userBtn">
Users
</button>


<div class="container">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Current Price">

<input id="oldPrice"
placeholder="Old Price">

<input id="packQty"
placeholder="Pack Quantity (500g / 1kg / 250ml)">


<!-- Quantity Variants -->

<div class="stockBox">

<input
type="checkbox"
id="enableVariants">

<label>
Enable Multiple Quantity Options
</label>

</div>


<div
id="variantSection"
style="display:none;margin-top:15px;">

<button
type="button"
id="addVariantBtn"
style="background:#2196f3;color:white;margin-bottom:10px;">

+ Add Quantity

</button>

<div id="variantFields"></div>

</div>


<!-- Category dropdown (populated dynamically) -->
<select id="category"></select>

<input id="image" placeholder="Image URL">

<textarea id="description" placeholder="Description"></textarea>

<!-- Few Stock -->
<div class="stockBox">
<input type="checkbox" id="fewStock">
<label>Few Stock Available</label>
</div>

<!-- Free Delivery -->
<div class="stockBox">
<input type="checkbox" id="freeDelivery">
<label>🚚 Free Delivery</label>
</div>

<button id="addBtn">
Add Product
</button>

</div>


<!-- ── Category Manager ── -->
<h2 class="heading">Categories</h2>

<div class="container">
  <div class="category-manager">
    <h3>Manage Categories</h3>
    <div class="category-add-row">
      <input id="newCategoryInput" placeholder="New category name…">
      <button id="addCategoryBtn">+ Add</button>
    </div>
    <div class="category-chips" id="categoryChips">
      <!-- chips rendered by JS -->
    </div>
  </div>
</div>


<h2 class="heading">
Products
</h2>

<div id="products">
Loading...
</div>


<h2>All Orders</h2>

<div id="allOrders"></div>


<div id="statusPopup">

<div class="popup-box">

<h3>Order Details</h3>

<div class="detail">
<b>Order ID:</b>
<div id="orderId"></div>
</div>

<div class="detail">
<b>Product:</b>
<div id="productName"></div>
</div>

<div class="detail">
<b>Quantity:</b>
<div id="quantity"></div>
</div>

<div class="detail">
<b>Total Price:</b>
<div id="totalPrice"></div>
</div>

<h3>User Details</h3>

<div class="detail">
👤 <span id="userName"></span>
</div>

<div class="detail">
📧 <span id="userEmail"></span>
</div>

<div class="detail">
📱 <span id="userPhone"></span>
</div>

<div class="detail">
🏠 <span id="userAddress"></span>
</div>


<select id="statusSelect">
<option value="Pending">Pending</option>
<option value="Accepted">Accepted</option>
<option value="Delivered">Delivered</option>
</select>

<input
id="trackingId"
placeholder="Tracking ID"
style="display:none;">

<button id="updateBtn" class="updateBtn">
Update Order
</button>

<button onclick="closePopup()" class="closeBtn">
Close
</button>

</div>
</div>

<script type="module" src="js/admin.js"></script>


<div id="editPopup"
style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
">

<div class="popup-box">

<h2>Edit Product</h2>

<input id="editName" placeholder="Product Name">
<input id="editPrice" placeholder="Price">
<input id="editOldPrice" placeholder="Old Price">
<input id="editPackQty" placeholder="Pack Quantity">
<input id="editImage" placeholder="Image URL">

<textarea id="editDescription" placeholder="Description"></textarea>

<!-- Category (edit) — populated dynamically -->
<label style="display:block;margin-top:15px;font-size:13px;color:#555;font-weight:600;">Category</label>
<select id="editCategory" style="width:100%;padding:12px;margin-top:6px;border-radius:10px;border:1.5px solid #e0e0e0;font-size:14px;"></select>

<!-- Few Stock (edit) -->
<div class="stockBox" style="margin-top:15px;">
  <input type="checkbox" id="editFewStock">
  <label>Few Stock Available</label>
</div>

<!-- Free Delivery (edit) -->
<div class="stockBox" style="margin-top:12px;">
  <input type="checkbox" id="editFreeDelivery">
  <label>🚚 Free Delivery</label>
</div>

<button
  id="saveEditBtn"
  style="background:#2e7d32;color:white;">
  Save Changes
</button>

<button onclick="closeEdit()" class="closeBtn">
  Close
</button>

</div>

</div>

</body>
</html>

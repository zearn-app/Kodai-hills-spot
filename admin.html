<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kodai Hills Spot — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f0f4f0;min-height:100vh;padding:20px 16px 40px;}

.navbar{
  background:white;padding:14px 16px;border-radius:16px;
  display:flex;align-items:center;gap:12px;margin-bottom:24px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.logo-img{width:46px;height:46px;border-radius:50%;object-fit:cover;}
.logo-text{font-size:18px;font-weight:700;color:#2e7d32;}

.stats-row{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;
}
.stat-card{
  background:white;border-radius:14px;padding:18px 14px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.stat-card h3{font-size:12px;color:#888;font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.stat-card h1{font-size:34px;font-weight:800;color:#2e7d32;}
.stat-card .loading{font-size:22px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.section-title{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}

.nav-cards{display:flex;flex-direction:column;gap:12px;}

.nav-card{
  background:white;border-radius:16px;padding:20px 18px;
  display:flex;align-items:center;gap:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  text-decoration:none;cursor:pointer;border:none;width:100%;
  transition:transform .15s,box-shadow .15s;
}
.nav-card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(0,0,0,.1);}

.nav-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
}
.nav-icon.green{background:#e8f5e9;}
.nav-icon.blue{background:#e3f2fd;}
.nav-icon.orange{background:#fff3e0;}

.nav-info{text-align:left;flex:1;}
.nav-info h2{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.nav-info p{font-size:13px;color:#999;}

.nav-arrow{font-size:20px;color:#ccc;}
</style>
</head>
<body>

<nav class="navbar">
  <img src="logo.png" class="logo-img" onerror="this.style.display='none'">
  <div class="logo-text">Kodai Hills Spot Admin</div>
</nav>

<div class="stats-row">
  <div class="stat-card">
    <h3>Products</h3>
    <h1 id="totalProducts"><span class="loading">…</span></h1>
  </div>
  <div class="stat-card">
    <h3>Orders</h3>
    <h1 id="totalOrders"><span class="loading">…</span></h1>
  </div>
</div>

<p class="section-title">Manage</p>

<div class="nav-cards">
  <a class="nav-card" href="admin_product.html">
    <div class="nav-icon green">🛒</div>
    <div class="nav-info">
      <h2>Products</h2>
      <p>Add, edit & delete products</p>
    </div>
    <span class="nav-arrow">›</span>
  </a>

  <a class="nav-card" href="admin_orders.html">
    <div class="nav-icon blue">📦</div>
    <div class="nav-info">
      <h2>Orders</h2>
      <p>View & update order status</p>
    </div>
    <span class="nav-arrow">›</span>
  </a>

  <a class="nav-card" href="srkxditit.html">
    <div class="nav-icon orange">👤</div>
    <div class="nav-info">
      <h2>Users</h2>
      <p>Browse & manage user accounts</p>
    </div>
    <span class="nav-arrow">›</span>
  </a>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location = "index.html"; return; }
  if (user.email !== "kodaihillsspot@gmail.com") {
    alert("Access denied");
    window.location = "home.html";
    return;
  }

  // Fetch counts using getDocs — works with standard Firestore rules
  try {
    const [pSnap, oSnap] = await Promise.all([
      getDocs(collection(db, "Products")),
      getDocs(collection(db, "Orders"))
    ]);
    document.getElementById("totalProducts").innerText = pSnap.size;
    document.getElementById("totalOrders").innerText   = oSnap.size;
  } catch(e) {
    console.error("Stats error:", e);
    document.getElementById("totalProducts").innerText = "!";
    document.getElementById("totalOrders").innerText   = "!";
  }
});
</script>
</body>
</html>

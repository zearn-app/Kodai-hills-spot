<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<nav class="navbar">

<div class="logo-box">

<img src="assets/logo.png" class="logo-img">

<div class="logo-text">

Kodai Hills Spot Admin

</div>

</div>

</nav>


<div class="dashboard">

<div class="stat-card">

<h3>Total Products</h3>

<h1 id="totalProducts">0</h1>

</div>

<div class="stat-card">

<h3>Total Orders</h3>

<h1 id="totalOrders">0</h1>

</div>

</div>


<div class="container">

<h2>Add Product</h2>

<input
id="name"
placeholder="Product Name">

<input
id="price"
placeholder="Price">

<select id="category">

<option>Chocolate</option>

<option>Honey</option>

<option>Herbs</option>

<option>Oils</option>

</select>

<input
id="image"
placeholder="Image URL">

<textarea
id="description"
placeholder="Description">
</textarea>

<button id="addBtn">

Add Product

</button>

</div>


<h2 class="heading">

Products

</h2>

<div id="products">

Loading...

</div>


<script type="module"
src="js/admin.js">
</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Admin</title>

<link rel="stylesheet" href="css/admin.css">

<style>

#statusPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
}

.popup-box{
background:white;
width:100%;
max-height:90vh;
overflow:auto;
padding:20px;
border-radius:20px;
}

.detail{
margin-top:10px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
}

.popup-box select,
.popup-box input,
.popup-box button,
textarea{

width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:none;
}

.stockBox{
display:flex;
align-items:center;
margin-top:15px;
gap:10px;
}

.stockBox input{
width:auto;
}

.updateBtn{
background:#2e7d32;
color:white;
}

.closeBtn{
background:red;
color:white;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo-box">

<img src="logo.png" class="logo-img">

<div class="logo-text">
Kodai Hills Spot Admin
</div>

</div>

</nav>


<div class="dashboard">

<div class="stat-card">
<h3>Total Products</h3>
<h1 id="totalProducts">0</h1>
</div>

<div class="stat-card">
<h3>Total Orders</h3>
<h1 id="totalOrders">0</h1>
</div>

</div>


<button id="userBtn">
Users
</button>


<div class="container">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Current Price">

<input id="oldPrice"
placeholder="Old Price">

<input id="packQty"
placeholder="Pack Quantity (500g / 1kg / 250ml)">

<select id="category">

<option>Chocolate</option>
<option>Honey</option>
<option>Herbs</option>
<option>Oils</option>
<option>fruits</option>
<option>organic products</option>

</select>

<input id="image"
placeholder="Image URL">

<textarea
id="description"
placeholder="Description">
</textarea>

<div class="stockBox">

<input type="checkbox"
id="fewStock">

<label>
Few Stock Available
</label>

</div>

<button id="addBtn">
Add Product
</button>

</div>


<h2 class="heading">
Products
</h2>

<div id="products">
Loading...
</div>


<h2>All Orders</h2>

<div id="allOrders"></div>


<div id="statusPopup">

<div class="popup-box">

<h3>Order Details</h3>

<div class="detail">
<b>Order ID:</b>
<div id="orderId"></div>
</div>

<div class="detail">
<b>Product:</b>
<div id="productName"></div>
</div>

<div class="detail">
<b>Quantity:</b>
<div id="quantity"></div>
</div>

<div class="detail">
<b>Total Price:</b>
<div id="totalPrice"></div>
</div>

<h3>User Details</h3>

<div class="detail">
👤 <span id="userName"></span>
</div>

<div class="detail">
📧 <span id="userEmail"></span>
</div>

<div class="detail">
📱 <span id="userPhone"></span>
</div>

<div class="detail">
🏠 <span id="userAddress"></span>
</div>


<select id="statusSelect">

<option value="Pending">
Pending
</option>

<option value="Accepted">
Accepted
</option>

<option value="Delivered">
Delivered
</option>

</select>


<input
id="trackingId"
placeholder="Tracking ID"
style="display:none;">

<button
id="updateBtn"
class="updateBtn">
Update Order
</button>

<button
onclick="closePopup()"
class="closeBtn">
Close
</button>

</div>
</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>

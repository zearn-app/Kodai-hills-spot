<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{

background:white;
padding:25px;

width:350px;

border-radius:20px;

box-shadow:0 2px 15px rgba(0,0,0,.1);

}

input,button{

width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

}

button{

background:#2e7d32;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="box">

<h2>

Admin Login

</h2>

<input
id="email"
placeholder="Admin Email">

<input
id="password"
type="password"
placeholder="Password">

<button
id="loginBtn">

Login

</button>

</div>

<script type="module"
src="js/admin-login.js">
</script>

</body>

</html>

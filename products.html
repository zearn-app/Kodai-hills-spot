<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
padding-bottom:90px;
overflow-x:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.left-header{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #2e7d32;
}

.title{
font-size:25px;
font-weight:bold;
color:#2e7d32;
}

.cart-btn{
position:fixed;
top:20px;
right:15px;
width:55px;
height:55px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
font-size:26px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
z-index:999;
transition:.3s;
}

.cart-btn:hover{
transform:scale(1.1);
}

.search,.filter{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:15px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
outline:none;
}

.category-scroll{
display:flex;
overflow:auto;
gap:12px;
margin-bottom:15px;
}

.category-scroll::-webkit-scrollbar{
display:none;
}

.category-card{
min-width:120px;
padding:12px;
background:white;
border-radius:12px;
text-align:center;
font-weight:bold;
cursor:pointer;
transition:.4s;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 3px 15px rgba(0,0,0,.1);
cursor:pointer;
overflow:hidden;
opacity:0;
transform:translateY(30px);
animation:show .5s forwards;
transition:.4s;
}

.card:hover{
transform:translateY(-5px);
}

@keyframes show{
to{
opacity:1;
transform:translateY(0);
}
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
transition:.4s;
}

.card:hover img{
transform:scale(1.05);
}

.btn{
width:100%;
padding:10px;
background:#2e7d32;
border:none;
border-radius:10px;
color:white;
margin-top:10px;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(.95);
}

.price{
font-size:18px;
font-weight:bold;
color:#2e7d32;
}

.old-price{
text-decoration:line-through;
color:red;
margin-right:8px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
color:black;
}

.active{
color:#2e7d32;
font-weight:bold;
}

</style>
</head>

<body>


<a href="cart.html" class="cart-btn">

🛒

<div class="cart-dot"></div>

</a>


<div class="header">

<div class="left-header">

<img src="logo.png" class="logo">

<div class="title">

Products

</div>

</div>

</div>


<input
class="search"
id="searchInput"
placeholder="🔍 Search products">


<div class="category-scroll">

<div class="category-card">
🍫 Chocolate
</div>

<div class="category-card">
🥑 Fruits
</div>

<div class="category-card">
🥔 Vegetables
</div>

<div class="category-card">
🌿 Organic
</div>

</div>


<select
class="filter"
id="priceFilter">

<option value="">
Sort Products
</option>

<option value="low">
Price Low → High
</option>

<option value="high">
Price High → Low
</option>

<option value="buy">
Most Buyed
</option>

</select>


<div
class="products"
id="products">

Loading...

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>
Home

</a>

<a
href="products.html"
class="active">

🛍️<br>
Products

</a>

<a
id="profileNav">

Loading...

</a>

</nav>



<script
type="module"
src="./js/products.js">

</script>

</body>
</html>

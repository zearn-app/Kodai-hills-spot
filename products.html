<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
padding-bottom:90px;
overflow-x:hidden;
}

/* Main content animation */

.main-content{
animation:pageLoad 1.2s ease;
}

@keyframes pageLoad{

0%{
opacity:0;
transform:translateY(30px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@keyframes cardShow{

0%{
opacity:0;
transform:translateY(50px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@keyframes popupShow{

0%{
opacity:0;
transform:scale(.75);
}

100%{
opacity:1;
transform:scale(1);
}

}

/* Header */

.header{

display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;

}

.logo{

width:50px;
height:50px;
border-radius:50%;
border:2px solid #2e7d32;

}

.title{

font-size:25px;
font-weight:bold;
color:#2e7d32;

}

/* Search */

.search{

width:100%;
padding:15px;
border:none;
border-radius:15px;

margin-bottom:15px;

background:white;

box-shadow:0 2px 10px rgba(0,0,0,.08);

transition:.4s;

}

.search:focus{

transform:scale(1.02);

outline:none;

}

/* Category */

.category-scroll{

display:flex;
overflow:auto;
gap:12px;

margin-bottom:15px;

padding-bottom:5px;

}

.category-scroll::-webkit-scrollbar{

display:none;

}

.category-card{

min-width:120px;

padding:12px;

background:white;

border-radius:12px;

text-align:center;

font-weight:bold;

box-shadow:0 2px 10px rgba(0,0,0,.08);

cursor:pointer;

transition:.4s;

}

.category-card:hover{

background:#2e7d32;
color:white;

transform:translateY(-5px);

}

/* Filter */

.filter{

width:100%;

padding:15px;

border:none;

border-radius:15px;

margin-bottom:20px;

background:white;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

/* Products */

.products{

display:grid;
grid-template-columns:repeat(2,1fr);

gap:15px;

}

.card{

background:white;

padding:10px;

border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

animation:cardShow .8s ease forwards;

transition:.4s;

}

.card:hover{

transform:translateY(-5px);

}

.card img{

width:100%;
height:140px;

object-fit:cover;

border-radius:10px;

}

.card h3{

margin-top:10px;

font-size:16px;

}

.price{

font-size:18px;
font-weight:bold;
color:#2e7d32;

margin:8px 0;

}

.btn{

width:100%;

padding:10px;

background:#2e7d32;

border:none;

border-radius:10px;

color:white;

cursor:pointer;

transition:.3s;

}

.btn:active{

transform:scale(.95);

}

/* Bottom Navbar */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

z-index:9999;

}

.bottom-nav a{

text-decoration:none;

color:black;

text-align:center;

font-size:14px;

transition:.3s;

}

.bottom-nav a:active{

transform:scale(.92);

}

.active{

color:#2e7d32;
font-weight:bold;

}

/* Popup */

.popup-container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:10000;

}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .35s ease;

}

.popup img{

width:80px;
height:80px;

border-radius:50%;

border:2px solid #2e7d32;

margin-bottom:15px;

}

.popup h2{

color:#2e7d32;

margin-bottom:10px;

}

.popup p{

margin-bottom:20px;

}

.popup button{

padding:12px 30px;

border:none;

border-radius:10px;

background:#2e7d32;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="main-content">

<div class="header">

<img src="logo.png" class="logo">

<div class="title">

Products

</div>

</div>

<input
class="search"
id="searchInput"
placeholder="🔍 Search products">


<div class="category-scroll">

<div class="category-card">🍫 Chocolate</div>

<div class="category-card">🥑 Fruits</div>

<div class="category-card">🥔 Vegetables</div>

<div class="category-card">🌿 Organic</div>

</div>


<select
class="filter"
id="priceFilter">

<option value="">Sort Products</option>

<option value="low">Price Low → High</option>

<option value="high">Price High → Low</option>

<option value="buy">Most Buyed</option>

</select>


<div class="products" id="products">

Loading...

</div>

</div>


<nav class="bottom-nav">

<a href="index.html">
🏠<br>Home
</a>

<a href="products.html"
class="active">
🛍️<br>Products
</a>

<a href="cart.html">
🛒<br>Cart
</a>

<div id="profileNav"></div>

</nav>


<div
id="popupBox"
class="popup-container">

<div class="popup">

<img src="logo.png">

<h2 id="popupTitle"></h2>

<p id="popupMessage"></p>

<button onclick="closePopup()">

OK

</button>

</div>

</div>

<script>

function showPopup(title,message){

popupTitle.innerText=title;

popupMessage.innerText=message;

popupBox.style.display="flex";

}

function closePopup(){

popupBox.style.display="none";

}

</script>

<script type="module" src="js/products.js"></script>

</body>
</html>

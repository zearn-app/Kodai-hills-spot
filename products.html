<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products</title>
<style>

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }

body{ background:#f0f4f0; padding:15px; padding-bottom:90px; overflow-x:hidden; }

/* ── Header ── */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}
.left-header{ display:flex; align-items:center; gap:10px; }
.logo{ width:48px; height:48px; border-radius:50%; border:2px solid #2e7d32; object-fit:cover; }
.title{ font-size:24px; font-weight:700; color:#2e7d32; }

/* ── Cart button ── */
.cart-btn{
  position:fixed;
  top:18px; right:15px;
  width:52px; height:52px;
  border-radius:50%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  font-size:24px;
  box-shadow:0 4px 18px rgba(0,0,0,.18);
  z-index:999;
  transition:.3s;
}
.cart-btn:hover{ transform:scale(1.1); }

/* ── Search ── */
.search{
  width:100%;
  padding:14px 16px;
  border:1.5px solid #e0e0e0;
  border-radius:14px;
  margin-bottom:13px;
  background:white;
  outline:none;
  font-size:15px;
  transition:border-color .2s;
}
.search:focus{ border-color:#2e7d32; }

/* ── Category scroll ── */
.category-scroll{
  display:flex;
  overflow-x:auto;
  gap:10px;
  margin-bottom:13px;
  padding-bottom:4px;
}
.category-scroll::-webkit-scrollbar{ display:none; }

.category-card{
  min-width:110px;
  padding:10px 14px;
  background:white;
  border-radius:12px;
  text-align:center;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  border:2px solid transparent;
  transition:.25s;
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.category-card.active,
.category-card:hover{
  border-color:#2e7d32;
  color:#2e7d32;
  background:#f0faf0;
}

/* ── Filter button ── */
.filter-btn{
  width:100%;
  padding:13px;
  border:1.5px solid #e0e0e0;
  border-radius:14px;
  margin-bottom:15px;
  background:white;
  font-size:15px;
  cursor:pointer;
  text-align:left;
  transition:border-color .2s;
}
.filter-btn:hover{ border-color:#2e7d32; }

/* ── Products grid ── */
.products{ display:grid; grid-template-columns:repeat(2,1fr); gap:13px; }

/* ── Product card ── */
.card{
  background:white;
  padding:10px;
  border-radius:16px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
  cursor:pointer;
  overflow:hidden;
  opacity:0;
  transform:translateY(24px);
  animation:show .4s forwards;
  transition:transform .3s;
  display:flex;
  flex-direction:column;
}
.card:hover{ transform:translateY(-4px); }

@keyframes show{ to{ opacity:1; transform:translateY(0); } }

.card-img{
  width:100%;
  height:135px;
  object-fit:cover;
  border-radius:11px;
  transition:.3s;
  pointer-events:none;
}
.card:hover .card-img{ transform:scale(1.04); }

.card-name{
  font-size:14px;
  font-weight:700;
  color:#1a1a1a;
  margin:8px 0 4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.price-row{ display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.old-price{ text-decoration:line-through; color:#bbb; font-size:12px; }
.price{ font-size:17px; font-weight:700; color:#2e7d32; }

.add-btn{
  width:100%;
  padding:10px;
  background:#2e7d32;
  border:none;
  border-radius:10px;
  color:white;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  margin-top:auto;
  transition:.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.add-btn:active{ transform:scale(.95); opacity:.85; }
.add-btn.added{ background:#1b5e20; }

/* ── Filter popup ── */
.filter-overlay{
  display:none;
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,.45);
  justify-content:center;
  align-items:flex-end;
  z-index:9999;
}
.filter-box{
  background:white;
  width:100%;
  padding:20px;
  border-radius:24px 24px 0 0;
  animation:slideUp .25s ease;
}
@keyframes slideUp{ from{ transform:translateY(100%); } to{ transform:translateY(0); } }

.filter-handle{
  width:40px; height:4px;
  background:#ddd; border-radius:2px;
  margin:0 auto 18px;
}
.filter-box h2{ font-size:18px; color:#1a1a1a; margin-bottom:14px; }

.popup-btn{
  width:100%;
  padding:14px;
  margin-top:9px;
  border:1.5px solid #e8e8e8;
  border-radius:12px;
  background:#fafafa;
  font-size:15px;
  cursor:pointer;
  text-align:left;
  transition:.2s;
}
.popup-btn:hover{ background:#2e7d32; color:white; border-color:#2e7d32; }
.popup-btn.active-filter{ background:#e8f5e9; border-color:#2e7d32; color:#2e7d32; font-weight:700; }

.close-btn{
  width:100%;
  padding:13px;
  margin-top:14px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
  font-size:15px;
  cursor:pointer;
}

/* ── Toast ── */
.toast{
  position:fixed;
  bottom:90px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#2e7d32;
  color:white;
  padding:11px 22px;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  opacity:0;
  transition:.3s;
  z-index:9999;
  white-space:nowrap;
  pointer-events:none;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed; bottom:0; left:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:12px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.bottom-nav a{ text-decoration:none; color:#777; font-size:13px; text-align:center; }
.bottom-nav a.active{ color:#2e7d32; font-weight:700; }

</style>
</head>
<body>

<a href="cart.html" class="cart-btn">🛒</a>

<div class="header">
  <div class="left-header">
    <img src="logo.png" class="logo">
    <div class="title">Products</div>
  </div>
</div>

<input class="search" id="searchInput" placeholder="🔍 Search products">

<div class="category-scroll">
  <div class="category-card" data-category="Chocolate">🍫 Chocolate</div>
  <div class="category-card" data-category="Fruits">🥑 Fruits</div>
  <div class="category-card" data-category="Vegetables">🥔 Vegetables</div>
  <div class="category-card" data-category="Organic">🌿 Organic</div>
</div>

<button class="filter-btn" id="openFilter">⚙️ Filter Products</button>

<div id="products" class="products">Loading...</div>

<!-- Filter Popup -->
<div id="filterOverlay" class="filter-overlay">
  <div class="filter-box">
    <div class="filter-handle"></div>
    <h2>Filter Products</h2>
    <button class="popup-btn" data-value="low">📈 Price: Low → High</button>
    <button class="popup-btn" data-value="high">📉 Price: High → Low</button>
    <button class="popup-btn" data-value="buy">🔥 Most Bought</button>
    <button class="popup-btn" data-value="">✕ Clear Filter</button>
    <button class="close-btn" id="closeFilter">Close</button>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">✓ Added to cart</div>

<nav class="bottom-nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="products.html" class="active">🛍️<br>Products</a>
  <a id="profileNav" href="login.html">🔐<br>Login</a>
</nav>

<script type="module" src="./js/products.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
padding-bottom:90px;
}

/* Header */

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.logo{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #2e7d32;
}

.title{
font-size:25px;
font-weight:bold;
color:#2e7d32;
}


/* Search */

.search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}


/* Category scroll */

.category-scroll{
display:flex;
overflow:auto;
gap:12px;
margin-bottom:15px;
padding-bottom:5px;
}

.category-scroll::-webkit-scrollbar{
display:none;
}

.category-card{
min-width:120px;
padding:12px;
background:white;
border-radius:12px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
}

.category-card:hover{
background:#2e7d32;
color:white;
}


/* Amount filter */

.filter{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
background:white;
}


/* Products */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
font-size:16px;
}

.price{
font-size:18px;
font-weight:bold;
color:#2e7d32;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:#2e7d32;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}


/* Bottom nav */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
color:black;
text-align:center;
}

.active{
color:#2e7d32;
font-weight:bold;
}

</style>

</head>

<body>


<!-- Header -->

<div class="header">

<img src="logo.png"
class="logo">

<div class="title">

Products

</div>

</div>


<!-- Search -->

<input
class="search"
id="searchInput"
placeholder="🔍 Search products">


<!-- Categories like Amazon/Flipkart -->

<div class="category-scroll">

<div class="category-card">
🍫 Chocolate
</div>

<div class="category-card">
🥑 Fruits
</div>

<div class="category-card">
🥔 Vegetables
</div>

<div class="category-card">
🌿 Organic Products
</div>

</div>


<!-- Amount filter -->

<select
class="filter"
id="priceFilter">

<option value="">
Sort Products
</option>

<option value="low">
Price : Low → High
</option>

<option value="high">
Price : High → Low
</option>

<option value="buy">
Most Buyed
</option>

</select>


<!-- Products -->

<div
class="products"
id="products">

Loading...

</div>


<!-- Bottom Navigation -->

<nav class="bottom-nav">

<a href="index.html">

🏠<br>Home

</a>

<a href="products.html"
class="active">

🛍️<br>Products

</a>

<a href="cart.html">

🛒<br>Cart

</a>

<div id="profileNav"></div>

</nav>


<script type="module">

import {auth}
from "./js/firebase.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const profileNav=
document.getElementById(
"profileNav"
);

onAuthStateChanged(

auth,

(user)=>{

if(user){

profileNav.innerHTML=`

<a href="profile.html">

👤<br>Profile

</a>

`;

}else{

profileNav.innerHTML="";

}

}

);

</script>


<script type="module"
src="js/products.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
padding-bottom:90px;
overflow-x:hidden;
}

/* Header */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.left-header{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #2e7d32;
}

.title{
font-size:25px;
font-weight:bold;
color:#2e7d32;
}

/* Floating cart */

.cart-btn{

position:fixed;

top:20px;
right:15px;

width:55px;
height:55px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

text-decoration:none;
font-size:26px;

box-shadow:0 3px 15px rgba(0,0,0,.2);

z-index:9999;

}

.cart-dot{

position:absolute;

top:10px;
right:10px;

width:10px;
height:10px;

background:red;

border-radius:50%;

}

/* Search */

.search{

width:100%;
padding:15px;

border:none;
border-radius:15px;

margin-bottom:15px;

background:white;

box-shadow:0 2px 10px rgba(0,0,0,.08);

outline:none;

}

/* Category */

.category-scroll{

display:flex;
overflow:auto;
gap:12px;

margin-bottom:15px;

}

.category-scroll::-webkit-scrollbar{
display:none;
}

.category-card{

min-width:120px;

padding:12px;

background:white;

border-radius:12px;

text-align:center;

font-weight:bold;

box-shadow:0 2px 10px rgba(0,0,0,.08);

cursor:pointer;

}

/* Filter */

.filter{

width:100%;
padding:15px;

border:none;
border-radius:15px;

margin-bottom:20px;

background:white;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

/* Products */

.products{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}

.card{

background:white;

padding:10px;

border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

position:relative;

}

.card img{

width:100%;
height:140px;

object-fit:cover;

border-radius:10px;

}

.card h3{

margin-top:10px;

font-size:16px;

}

.price{

font-size:18px;
font-weight:bold;
color:#2e7d32;

}

.btn{

width:100%;
padding:10px;

background:#2e7d32;

border:none;

border-radius:10px;

color:white;

margin-top:10px;

}

.stock-badge{

position:absolute;
top:8px;
right:8px;

background:red;
color:white;

padding:5px 10px;

border-radius:20px;

font-size:11px;

}

.pack{

font-size:13px;
font-weight:bold;
color:#666;

margin-top:5px;

}

.old-price{

text-decoration:line-through;
color:red;
font-size:14px;

margin-right:8px;

}

/* Bottom nav */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;
color:black;

text-align:center;

}

.active{

color:#2e7d32;
font-weight:bold;

}

</style>

</head>

<body>


<a href="cart.html" class="cart-btn">

🛒

<div class="cart-dot"></div>

</a>


<div class="header">

<div class="left-header">

<img src="logo.png" class="logo">

<div class="title">

Products

</div>

</div>

</div>


<input
class="search"
id="searchInput"
placeholder="🔍 Search products">


<div class="category-scroll">

<div class="category-card">
🍫 Chocolate
</div>

<div class="category-card">
🥑 Fruits
</div>

<div class="category-card">
🥔 Vegetables
</div>

<div class="category-card">
🌿 Organic
</div>

</div>


<select
class="filter"
id="priceFilter">

<option value="">
Sort Products
</option>

<option value="low">
Price Low → High
</option>

<option value="high">
Price High → Low
</option>

<option value="buy">
Most Buyed
</option>

</select>


<div
class="products"
id="products">

Loading...

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>
Home

</a>

<a
href="products.html"
class="active">

🛍️<br>
Products

</a>

<a
id="profileNav">

Loading...

</a>

</nav>


<script type="module">

import { auth }
from "./js/firebase.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const profileNav=
document.getElementById(
"profileNav"
);


onAuthStateChanged(

auth,

(user)=>{

if(user){

profileNav.href=
"profile.html";

profileNav.innerHTML=`

👤<br>
Yours

`;

}

else{

profileNav.href=
"login.html";

profileNav.innerHTML=`

🔐<br>
Login

`;

}

}

);

</script>


<script
type="module"
src="./js/products.js">

</script>

</body>
</html>

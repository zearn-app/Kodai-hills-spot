<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
padding-bottom:100px;
}

.card{

background:white;
padding:20px;
border-radius:20px;
box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.image{

width:100%;
height:260px;
border-radius:15px;
object-fit:cover;

}

.name{

font-size:28px;
font-weight:bold;
margin-top:15px;

}

.price{

font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-top:10px;

}

.category{

margin-top:10px;
font-weight:bold;

}

.description{

margin-top:15px;
line-height:25px;
color:gray;

}

.qty{

display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:20px;

}

.qty button{

width:40px;
height:40px;
border:none;
border-radius:50%;
background:#2e7d32;
color:white;
font-size:20px;

}

.count{

font-size:22px;
font-weight:bold;

}

.action{

display:flex;
gap:10px;
margin-top:20px;

}

.action button{

flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
color:white;

}

.cart{

background:#2e7d32;

}

.buy{

background:#ff9800;

}

.section{

margin-top:30px;

}

.title{

font-size:22px;
font-weight:bold;
margin-bottom:15px;

}

.review{

background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;

}

.related{

display:flex;
gap:10px;
overflow:auto;

}

.related::-webkit-scrollbar{
display:none;
}

.related-card{

min-width:150px;
background:white;
padding:10px;
border-radius:15px;

}

.related-card img{

width:100%;
height:100px;
border-radius:10px;
object-fit:cover;

}

select,textarea{

width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;

}

textarea{

height:90px;

}

.submit{

width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;

}

</style>

</head>

<body>


<div class="card">

<img id="image" class="image">

<div class="name" id="name">

Loading...

</div>

<div class="price" id="price"></div>

<div class="category" id="category"></div>

<div class="description" id="description"></div>


<div class="qty">

<button id="minus">−</button>

<div id="count" class="count">

1

</div>

<button id="plus">+</button>

</div>


<div class="action">

<button
class="cart"
id="cartBtn">

🛒 Add Cart

</button>

<button
class="buy"
id="buyBtn">

⚡ Buy Now

</button>

</div>

</div>



<div class="section">

<div class="title">

⭐ Reviews

</div>

<div id="reviews">

Loading...

</div>


<select id="rating">

<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>

</select>

<textarea
id="comment"
placeholder="Write review...">

</textarea>

<button
class="submit"
id="reviewBtn">

Submit Review

</button>

</div>



<div class="section">

<div class="title">

Related Products

</div>

<div
class="related"
id="related">

</div>

</div>



<script type="module">

import {db,auth}
from "./js/firebase.js";

import {

doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const params=
new URLSearchParams(
window.location.search
);

const id=
params.get("id");

let quantity=1;
let currentUser=null;
let currentProduct=null;


onAuthStateChanged(

auth,

(user)=>{

currentUser=user;

}

);


plus.onclick=()=>{

quantity++;

count.innerText=
quantity;

};


minus.onclick=()=>{

if(quantity>1){

quantity--;

count.innerText=
quantity;

}

};


async function loadProduct(){

const snapshot=

await getDoc(

doc(
db,
"Products",
id
)

);

currentProduct=
snapshot.data();


image.src=
currentProduct.Image;

name.innerText=
currentProduct.name;

price.innerText=
"₹"+
currentProduct.price;

category.innerText=
"Category : "+
currentProduct.category;

description.innerText=
currentProduct.description;


loadRelated();

loadReviews();

}


async function loadRelated(){

const querySnapshot=

await getDocs(

collection(
db,
"Products"
)

);


related.innerHTML="";


querySnapshot.forEach((doc)=>{

const data=
doc.data();

if(doc.id!=id){

related.innerHTML+=`

<div class="related-card"

onclick="window.location='product-details.html?id=${doc.id}'">

<img src="${data.Image}">

<h4>

${data.name}

</h4>

<p>

₹${data.price}

</p>

</div>

`;

}

});

}


cartBtn.onclick=

async()=>{

if(!currentUser){

window.location=
"login.html";

return;

}


await addDoc(

collection(
db,
"Cart"
),

{

uid:
currentUser.uid,

productId:id,

name:
currentProduct.name,

price:
currentProduct.price,

image:
currentProduct.Image,

quantity:quantity

}

);

alert(
"Added to Cart"
);

};


buyBtn.onclick=()=>{

if(!currentUser){

window.location=
"login.html";

return;

}

window.location=

"checkout.html?id="+
id+
"&qty="+
quantity;

};


reviewBtn.onclick=

async()=>{

if(!currentUser){

window.location=
"login.html";

return;

}


await addDoc(

collection(
db,
"Reviews"
),

{

uid:
currentUser.uid,

productId:id,

rating:
rating.value,

comment:
comment.value,

date:
new Date()

}

);


comment.value="";

loadReviews();

};


async function loadReviews(){

reviews.innerHTML="";


const q=

query(

collection(
db,
"Reviews"
),

where(
"productId",
"==",
id
)

);


const snapshot=
await getDocs(q);


snapshot.forEach((doc)=>{

const data=
doc.data();

reviews.innerHTML+=`

<div class="review">

<div>

${data.rating}

</div>

<p>

${data.comment}

</p>

</div>

`;

});

}


loadProduct();

</script>

</body>
</html>

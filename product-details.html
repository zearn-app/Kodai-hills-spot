<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
padding-bottom:100px;
}

.review{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 2px 15px rgba(0,0,0,.1);
}

.image{
width:100%;
height:260px;
border-radius:15px;
object-fit:cover;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.price{
font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-top:10px;
}

.category{
margin-top:10px;
font-weight:bold;
}

.description{
margin-top:15px;
line-height:25px;
color:gray;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:20px;
}

.qty button{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#2e7d32;
color:white;
font-size:20px;
}

.count{
font-size:22px;
font-weight:bold;
}

.action{
display:flex;
gap:10px;
margin-top:20px;
}

.action button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
color:white;
}

.cart{
background:#2e7d32;
}

.buy{
background:#ff9800;
}

.section{
margin-top:30px;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.related{
display:flex;
gap:10px;
overflow:auto;
}

.related::-webkit-scrollbar{
display:none;
}

.related-card{
min-width:150px;
background:white;
padding:10px;
border-radius:15px;
}

.related-card img{
width:100%;
height:100px;
border-radius:10px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="card">

<img id="image" class="image">

<div class="name" id="name">
Loading...
</div>

<div class="price" id="price"></div>

<div class="category" id="category"></div>

<div class="description" id="description"></div>

<div class="qty">

<button id="minus">−</button>

<div id="count" class="count">
1
</div>

<button id="plus">+</button>

</div>

<div class="action">

<button class="cart" id="cartBtn">
🛒 Add Cart
</button>

<button class="buy" id="buyBtn">
⚡ Buy Now
</button>

</div>

</div>


<div class="section">

<div class="title">
⭐ Reviews
</div>

<div id="reviews">
Loading...
</div>

</div>


<div class="section">

<div class="title">
Related Products
</div>

<div class="related" id="related">
</div>

</div>

<script type="module">

import { db, auth }
from "./js/firebase.js";

import {
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const imageEl=document.getElementById("image");
const reviewsDiv=document.getElementById("reviews");
const nameEl=document.getElementById("name");
const priceEl=document.getElementById("price");
const categoryEl=document.getElementById("category");
const descriptionEl=document.getElementById("description");
const countEl=document.getElementById("count");
const plusBtn=document.getElementById("plus");
const minusBtn=document.getElementById("minus");
const cartBtn=document.getElementById("cartBtn");
const buyBtn=document.getElementById("buyBtn");
const relatedDiv=document.getElementById("related");

const params=
new URLSearchParams(
window.location.search
);

const id=params.get("id");

let quantity=1;
let currentUser=null;
let currentProduct=null;


/* Login */

onAuthStateChanged(

auth,

(user)=>{

currentUser=user;

});


plusBtn.onclick=()=>{

quantity++;
countEl.innerText=quantity;

};

minusBtn.onclick=()=>{

if(quantity>1){

quantity--;
countEl.innerText=quantity;

}

};


async function loadProduct(){

const snapshot=
await getDoc(
doc(
db,
"Products",
id
)
);

currentProduct=
snapshot.data();

imageEl.src=
currentProduct.Image;

nameEl.innerText=
currentProduct.name;

priceEl.innerText=
"₹"+currentProduct.price;

categoryEl.innerText=
"Category : "+
currentProduct.category;

descriptionEl.innerText=
currentProduct.description;

loadReviews();
loadRelated();

}


/* Reviews */

async function loadReviews(){

reviewsDiv.innerHTML="";

const q=query(

collection(
db,
"Reviews"
),

where(
"productId",
"==",
id
)

);

const snapshot=
await getDocs(q);

if(snapshot.empty){

reviewsDiv.innerHTML=
"No reviews";

return;

}

snapshot.forEach((item)=>{

const data=
item.data();

reviewsDiv.innerHTML+=`

<div class="review">

<div>
${data.rating}
</div>

<p>
${data.comment}
</p>

</div>

`;

});

}


/* Related */

async function loadRelated(){

relatedDiv.innerHTML="";

const snapshot=
await getDocs(
collection(
db,
"Products"
)
);

snapshot.forEach((item)=>{

const data=
item.data();

if(item.id!==id){

relatedDiv.innerHTML+=`

<div
class="related-card"

onclick="window.location='product-details.html?id=${item.id}'">

<img src="${data.Image}">

<h4>
${data.name}
</h4>

<p>
₹${data.price}
</p>

</div>

`;

}

});

}


/* Add cart */

cartBtn.onclick=async()=>{


const item={

productId:id,

name:currentProduct.name,

price:currentProduct.price,

image:currentProduct.Image,

quantity:quantity

};


/* login user */

if(currentUser){

await addDoc(

collection(
db,
"Cart"
),

{

uid:
currentUser.uid,

...item

}

);

alert(
"Added to Cart"
);

return;

}


/* guest user */

let localCart=

JSON.parse(

localStorage.getItem(
"guestCart"
)

)||[];


localCart.push(item);

localStorage.setItem(

"guestCart",

JSON.stringify(
localCart
)

);

alert(
"Added to cart"
);

};



buyBtn.onclick=()=>{

window.location=
"cart.html";

};


loadProduct();

</script>

</body>

</html>

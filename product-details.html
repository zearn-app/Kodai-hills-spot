<!DOCTYPE html>
<html>

<head>

<title>Product Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:100px;
}

.card{

background:white;

padding:20px;

border-radius:20px;

box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.image{

width:100%;
height:250px;

object-fit:cover;

border-radius:15px;

}

.name{

font-size:28px;

font-weight:bold;

margin-top:15px;

}

.price{

font-size:24px;

color:#2e7d32;

font-weight:bold;

margin-top:10px;

}

.description{

margin-top:15px;

line-height:25px;

color:gray;

}

.category{

margin-top:15px;

font-weight:bold;

}

button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:15px;

background:#2e7d32;

color:white;

font-size:18px;

}

</style>

</head>

<body>

<div class="card">

<img
id="image"
class="image">

<div
class="name"
id="name">

Loading...

</div>

<div
class="price"
id="price">

</div>

<div
class="category"
id="category">

</div>

<div
class="description"
id="description">

</div>

<button
id="cartBtn">

🛒 Add To Cart

</button>

</div>


<script type="module">

import {db}
from "./js/firebase.js";

import {

doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


const params=
new URLSearchParams(
window.location.search
);

const id=
params.get(
"id"
);


async function loadProduct(){

const snapshot=

await getDoc(

doc(
db,
"Products",
id
)

);


const data=
snapshot.data();


document.getElementById(
"image"
).src=
data.Image;


document.getElementById(
"name"
).innerText=
data.name;


document.getElementById(
"price"
).innerText=
"₹"+data.price;


document.getElementById(
"category"
).innerText=
"Category : "+data.category;


document.getElementById(
"description"
).innerText=
data.description;

}

loadProduct();

</script>

</body>

</html>

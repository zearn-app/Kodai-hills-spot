<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Product Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:100px;
}

.card{

background:white;
padding:20px;
border-radius:20px;
box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.image{

width:100%;
height:250px;
object-fit:cover;
border-radius:15px;

}

.name{

font-size:28px;
font-weight:bold;
margin-top:15px;

}

.price{

font-size:24px;
color:#2e7d32;
font-weight:bold;
margin-top:10px;

}

.category{

margin-top:10px;
font-weight:bold;

}

.description{

margin-top:15px;
line-height:25px;
color:gray;

}

.qty{

display:flex;
align-items:center;
justify-content:center;
gap:20px;

margin-top:20px;

}

.qty button{

width:40px;
height:40px;
border:none;
border-radius:50%;
background:#2e7d32;
color:white;
font-size:22px;

}

.count{

font-size:24px;
font-weight:bold;

}

.action{

display:flex;
gap:10px;
margin-top:20px;

}

.action button{

flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;

}

.cart{

background:#2e7d32;
color:white;
}

.buy{

background:#ff9800;
color:white;
}

.section{

margin-top:30px;
}

.title{

font-size:22px;
font-weight:bold;
margin-bottom:15px;

}

.review{

background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;

}

.related{

display:flex;
overflow:auto;
gap:10px;

}

.related::-webkit-scrollbar{
display:none;
}

.related-card{

min-width:150px;
background:white;
padding:10px;
border-radius:15px;

}

.related-card img{

width:100%;
height:100px;
border-radius:10px;
object-fit:cover;

}

</style>

</head>

<body>


<div class="card">

<img
id="image"
class="image">

<div
class="name"
id="name">

Loading...

</div>

<div
class="price"
id="price">

</div>

<div
class="category"
id="category">

</div>

<div
class="description"
id="description">

</div>


<div class="qty">

<button id="minus">

−

</button>

<div
class="count"
id="count">

1

</div>

<button id="plus">

+

</button>

</div>


<div class="action">

<button
class="cart"
id="cartBtn">

🛒 Add Cart

</button>

<button
class="buy"
id="buyBtn">

⚡ Buy Now

</button>

</div>

</div>



<div class="section">

<div class="title">

⭐ Reviews

</div>

<div class="review">

⭐⭐⭐⭐⭐

Very good quality product

</div>

<div class="review">

⭐⭐⭐⭐

Fresh and natural

</div>

</div>
<select id="rating">

<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>

</select>

<textarea
id="comment">

</textarea>

<button id="reviewBtn">

Submit Review

</button>



<div class="section">

<div class="title">

Related Products

</div>

<div
class="related"
id="related">

Loading...

</div>

</div>



<script type="module">

import {db,auth}

from "./js/firebase.js";

import {

doc,
getDoc,
collection,
getDocs,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const params=
new URLSearchParams(
window.location.search
);

const id=
params.get("id");

let quantity=1;
let currentProduct=null;
let currentUser=null;


/* Auth check */

onAuthStateChanged(

auth,

(user)=>{

currentUser=user;

}

);


/* Quantity */

document.getElementById(
"plus"
)

.onclick=()=>{

quantity++;

document.getElementById(
"count"
).innerText=
quantity;

};


document.getElementById(
"minus"
)

.onclick=()=>{

if(quantity>1){

quantity--;

document.getElementById(
"count"
).innerText=
quantity;

}

};



async function loadProduct(){

const snapshot=

await getDoc(

doc(
db,
"Products",
id
)

);

currentProduct=
snapshot.data();


document.getElementById(
"image"
).src=
currentProduct.Image;

document.getElementById(
"name"
).innerText=
currentProduct.name;

document.getElementById(
"price"
).innerText=
"₹"+currentProduct.price;

document.getElementById(
"category"
).innerText=
"Category : "+
currentProduct.category;

document.getElementById(
"description"
).innerText=
currentProduct.description;


loadRelated();

}



/* Related products */

async function loadRelated(){

const relatedDiv=
document.getElementById(
"related"
);

relatedDiv.innerHTML="";


const querySnapshot=

await getDocs(

collection(
db,
"Products"
)

);


querySnapshot.forEach((doc)=>{

const data=
doc.data();

if(doc.id!==id){

relatedDiv.innerHTML +=`

<div
class="related-card"

onclick="window.location='product-details.html?id=${doc.id}'">

<img src="${data.Image}">

<h4>

${data.name}

</h4>

<p>

₹${data.price}

</p>

</div>

`;

}

});

}



/* Add cart */

document.getElementById(
"cartBtn"
)

.onclick=

async()=>{


if(!currentUser){

window.location=
"login.html";

return;

}


try{

await addDoc(

collection(
db,
"Cart"
),

{

uid:
currentUser.uid,

productId:
id,

name:
currentProduct.name,

price:
currentProduct.price,

image:
currentProduct.Image,

quantity:
quantity

}

);


alert(
"Added to cart"
);

}

catch(error){

alert(
error.message
);

}

};



/* Buy now */

document.getElementById(
"buyBtn"
)

.onclick=()=>{


if(!currentUser){

window.location=
"login.html";

return;

}


window.location=

"checkout.html?id="+
id+

"&qty="+
quantity;

};



loadProduct();

</script>

</body>

</html>

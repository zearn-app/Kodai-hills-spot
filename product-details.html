<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Details</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

.body{
background:#f5f5f5;
padding:15px;
padding-bottom:100px;
overflow-x:hidden;
animation:pageLoad .8s ease;
}

/* Animations */

@keyframes pageLoad{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes cardShow{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes imageZoom{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes slideLeft{
from{
opacity:0;
transform:translateX(40px);
}
to{
opacity:1;
transform:translateX(0);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}



/* Quantity Variant */

#variantList::-webkit-scrollbar{
display:none;
}

.variantBtn{

min-width:90px;

padding:15px;

background:white;

border:2px solid #ddd;

border-radius:15px;

font-size:18px;

cursor:pointer;

transition:.3s;

flex-shrink:0;

text-align:center;

}

.variantBtn:hover{

transform:translateY(-2px);

}

.variantActive{

border:3px solid #1565c0;

background:#e3f2fd;

}



/* Reviews */

.review{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;

animation:fadeUp .8s ease;
transition:.3s;
}

.review:hover{
transform:translateY(-4px);
}

/* Main Card */

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 2px 15px rgba(0,0,0,.1);

animation:cardShow .8s ease;
}

.image{
width:100%;
height:260px;
border-radius:15px;
object-fit:cover;

animation:imageZoom 1s ease;

transition:.5s;
}

.image:hover{
transform:scale(1.03);
}

.name{
font-size:28px;
font-weight:bold;
margin-top:15px;

animation:fadeUp .9s ease;
}

.price{
font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-top:10px;

animation:fadeUp 1s ease;
}

.category{
margin-top:10px;
font-weight:bold;

animation:fadeUp 1.1s ease;
}

.description{
margin-top:15px;
line-height:25px;
color:gray;

animation:fadeUp 1.2s ease;
}

/* Quantity */

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:20px;

animation:fadeUp 1.3s ease;
}

.qty button{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#2e7d32;
color:white;
font-size:20px;

cursor:pointer;

transition:.3s;
}

.qty button:hover{
transform:scale(1.08);
}

.qty button:active{
transform:scale(.9);
}

.count{
font-size:22px;
font-weight:bold;
}

/* Buttons */

.action{
display:flex;
gap:10px;
margin-top:20px;

animation:fadeUp 1.4s ease;
}

.action button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
color:white;

cursor:pointer;

transition:.4s;
}

.cart{
background:#2e7d32;
}

.buy{
background:#ff9800;
}

.cart:hover,
.buy:hover{
transform:translateY(-3px);
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.cart:active,
.buy:active{
transform:scale(.95);
}

/* Section */

.section{
margin-top:30px;
animation:fadeUp 1.5s ease;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

/* Related */

.related{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:5px;
}

.related::-webkit-scrollbar{
display:none;
}

.related-card{
min-width:150px;
background:white;
padding:10px;
border-radius:15px;

animation:slideLeft .8s ease;

transition:.4s;
}

.related-card:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.related-card img{
width:100%;
height:100px;
border-radius:10px;
object-fit:cover;

transition:.5s;
}

.related-card:hover img{
transform:scale(1.05);
}

</style>


</head>

<body>

<div class="card">

<img id="image" class="image">

<div class="name" id="name">
Loading...
</div>

<div class="price" id="price"></div>

<div class="category" id="category"></div>

<div class="description" id="description"></div>



<!-- Size / Quantity Selection -->

<div
id="variantBox"
style="margin-top:20px;display:none;">

<h3 style="
margin-bottom:12px;
font-size:18px;
">

Select Quantity

</h3>

<div
id="variantList"
style="
display:flex;
gap:10px;
overflow:auto;
padding-bottom:10px;
">

</div>

</div>

<div class="qty">

<button id="minus">−</button>

<div id="count" class="count">
1
</div>

<button id="plus">+</button>

</div>

<div class="action">

<button class="cart" id="cartBtn">
🛒 Add Cart
</button>

<button class="buy" id="buyBtn">
⚡ Buy Now
</button>

</div>

</div>


<div class="section">

<div class="title">
⭐ Reviews
</div>

<div id="reviews">
Loading...
</div>

</div>


<div class="section">

<div class="title">
Related Products
</div>

<div class="related" id="related">
</div>

</div>









<script type="module">

import { db, auth }
from "./js/firebase.js";

import {
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const imageEl=document.getElementById("image");
const reviewsDiv=document.getElementById("reviews");
const nameEl=document.getElementById("name");
const priceEl=document.getElementById("price");
const categoryEl=document.getElementById("category");
const descriptionEl=document.getElementById("description");
const countEl=document.getElementById("count");
const plusBtn=document.getElementById("plus");
const minusBtn=document.getElementById("minus");
const cartBtn=document.getElementById("cartBtn");
const buyBtn=document.getElementById("buyBtn");
const relatedDiv=document.getElementById("related");

const params=
new URLSearchParams(
window.location.search
);

const id=params.get("id");

let quantity=1;
let currentUser=null;
let currentProduct=null;
let selectedVariant=null;


/* Login */

onAuthStateChanged(

auth,

async(user)=>{

currentUser=user;

/* Move Guest Cart */

if(user){

let guestCart=

JSON.parse(
localStorage.getItem(
"guestCart"
)
)||[];

if(guestCart.length>0){

for(let item of guestCart){

await addDoc(

collection(
db,
"Cart"
),

{

uid:user.uid,
...item

}

);

}

localStorage.removeItem(
"guestCart"
);

}

}

}

);


/* Quantity */

plusBtn.onclick=()=>{

quantity++;

countEl.innerText=
quantity;

updatePrice();

};

minusBtn.onclick=()=>{

if(quantity>1){

quantity--;

countEl.innerText=
quantity;

updatePrice();

}

};


/* Update Total Price */

function updatePrice(){

const unitPrice=

selectedVariant?.price ||
currentProduct.price ||
0;

const total=

unitPrice*quantity;

priceEl.innerText=
`₹${total}`;

}


/* Load Product */

async function loadProduct(){

const snapshot=

await getDoc(

doc(
db,
"Products",
id)

);

currentProduct=
snapshot.data();

imageEl.src=
currentProduct.Image;

nameEl.innerText=
currentProduct.name;

categoryEl.innerText=
"Category : "+
currentProduct.category;

descriptionEl.innerText=
currentProduct.description;


const variantBox=
document.getElementById(
"variantBox"
);

const variantList=
document.getElementById(
"variantList"
);

variantList.innerHTML="";

let variants=[];


/* Multiple quantity variants */

if(

currentProduct.quantityVariants &&

currentProduct.quantityVariants.length>0

){

variants=
currentProduct.quantityVariants;

}

/* Single quantity */

else if(

currentProduct.packQty

){

variants=[{

qty:
currentProduct.packQty,

price:
currentProduct.price

}];

}


if(variants.length>0){

variantBox.style.display=
"block";

variants.forEach(

(item,index)=>{

const btn=
document.createElement(
"div"
);

btn.className=
"variantBtn";

btn.innerHTML=`

<div>

${item.qty}

</div>

<b>

₹${item.price}

</b>

`;

if(index===0){

selectedVariant=
item;

btn.classList.add(
"variantActive"
);

}

btn.onclick=()=>{

document
.querySelectorAll(
".variantBtn"
)

.forEach(btn=>{

btn.classList.remove(
"variantActive"
);

});

btn.classList.add(
"variantActive"
);

selectedVariant=
item;

updatePrice();

};

variantList.appendChild(
btn);

}

);

}

updatePrice();

loadReviews();

loadRelated();

}


/* Reviews */

async function loadReviews(){

reviewsDiv.innerHTML="";

const q=

query(

collection(
db,
"Reviews"
),

where(
"productId",
"==",
id
)

);

const snapshot=
await getDocs(q);

if(snapshot.empty){

reviewsDiv.innerHTML=
"No reviews";

return;

}

snapshot.forEach(

item=>{

const data=
item.data();

reviewsDiv.innerHTML+=`

<div class="review">

<div>

${data.rating}

</div>

<p>

${data.comment}

</p>

</div>

`;

}

);

}


/* Related */

async function loadRelated(){

relatedDiv.innerHTML="";

const snapshot=

await getDocs(

collection(
db,
"Products"
)

);

snapshot.forEach(

item=>{

const data=
item.data();

if(item.id!==id){

relatedDiv.innerHTML+=`

<div
class="related-card"

onclick="window.location='product-details.html?id=${item.id}'">

<img src="${data.Image}">

<h4>

${data.name}

</h4>

<p>

₹${data.price}

</p>

</div>

`;

}

}

);

}


/* Add Cart */

cartBtn.onclick=

async()=>{

const unitPrice=

selectedVariant?.price ||
currentProduct.price;

const itemTotal=

unitPrice*quantity;

const item={

productId:id,

name:
currentProduct.name,

image:
currentProduct.Image,

quantity:
quantity,

unitPrice:
unitPrice,

price:
itemTotal,

selectedSize:
selectedVariant?.qty ||
currentProduct.packQty ||
""

};


/* Firebase */

if(currentUser){

await addDoc(

collection(
db,
"Cart"
),

{

uid:
currentUser.uid,

...item

}

);

alert(
"Added to Cart"
);

return;

}


/* Guest */

let guestCart=

JSON.parse(
localStorage.getItem(
"guestCart"
)
)||[];

guestCart.push(
item
);

localStorage.setItem(

"guestCart",

JSON.stringify(
guestCart)

);

alert(
"Added to Cart"
);

};


/* Buy */

buyBtn.onclick=()=>{

cartBtn.click();

setTimeout(()=>{

window.location=
"cart.html";

},500);

};


loadProduct();

</script>






</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot - Cart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:100px;
animation:fadeIn .5s;
}

/* Animations */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes cardShow{

from{
opacity:0;
transform:translateX(-30px);
}

to{
opacity:1;
transform:translateX(0);
}

}

@keyframes popupShow{

from{
transform:scale(.7);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* Navbar */

.navbar{

background:white;

padding:15px;

display:flex;

align-items:center;

box-shadow:0 2px 10px rgba(0,0,0,.1);

position:sticky;

top:0;

z-index:100;

}

.logo-box{

display:flex;

align-items:center;

gap:10px;

}

.logo{

width:45px;
height:45px;

border-radius:50%;

object-fit:cover;

border:2px solid #2e7d32;

}

.logo-text{

font-size:22px;
font-weight:bold;
color:#2e7d32;

}

/* Header */

.cart-header{

padding:20px;

font-size:25px;

font-weight:bold;

}

/* Cart */

#cartItems{

padding:15px;

}

.card{

background:white;

padding:15px;

margin-bottom:15px;

border-radius:20px;

display:flex;

gap:15px;

box-shadow:0 3px 15px rgba(0,0,0,.08);

animation:cardShow .4s;

}

.card img{

width:100px;
height:100px;

border-radius:12px;

object-fit:cover;

}

.details{

flex:1;

}

.price{

margin:10px 0;

font-size:20px;

font-weight:bold;

color:#2e7d32;

}

.remove{

padding:10px 15px;

border:none;

border-radius:10px;

background:#e53935;

color:white;

cursor:pointer;

transition:.3s;

}

.remove:active{

transform:scale(.95);

}

/* Summary */

.summary{

position:fixed;

bottom:75px;
left:0;

width:100%;

background:white;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.total{

font-size:22px;

font-weight:bold;

color:#2e7d32;

margin-bottom:10px;

}

.checkout{

width:100%;

padding:14px;

border:none;

border-radius:15px;

background:#2e7d32;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

.checkout:active{

transform:scale(.97);

}

/* Bottom Nav */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;

color:black;

font-size:14px;

text-align:center;

}

.active{

color:#2e7d32;
font-weight:bold;

}

/* Popup */

.popup-container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:9999;

}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .3s;

}

.popup-logo{

width:80px;
height:80px;

border-radius:50%;

margin-bottom:15px;

border:2px solid #2e7d32;

}

.popup h2{

margin-bottom:10px;

color:#2e7d32;

}

.popup p{

margin-bottom:20px;

}

.popup button{

padding:12px 30px;

border:none;

border-radius:10px;

background:#2e7d32;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo-box">

<img src="logo.png"
class="logo">

<div class="logo-text">

Kodai Hills Spot

</div>

</div>

</nav>

<div class="cart-header">

🛒 My Cart

</div>

<div id="cartItems">

Loading...

</div>

<div class="summary">

<div class="total"
id="total">

Total : ₹0

</div>

<button
class="checkout"
id="checkoutBtn">

Proceed To Checkout

</button>

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>Home

</a>

<a href="products.html">

🛍️<br>Products

</a>

<a href="cart.html"
class="active">

🛒<br>Cart

</a>

<a href="profile.html">

👤<br>Profile

</a>

</nav>


<div id="popupBox"
class="popup-container">

<div class="popup">

<img src="logo.png"
class="popup-logo">

<h2 id="popupTitle"></h2>

<p id="popupMessage"></p>

<button onclick="closePopup()">

OK

</button>

</div>

</div>


<script type="module">

import {auth,db}
from "./js/firebase.js";

import {

collection,
query,
where,
getDocs,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


const cartItems=
document.getElementById(
"cartItems"
);

const totalDiv=
document.getElementById(
"total"
);

let firstProductId="";


function showPopup(
title,
message
){

popupTitle.innerText=
title;

popupMessage.innerText=
message;

popupBox.style.display=
"flex";

}

window.closePopup=()=>{

popupBox.style.display=
"none";

};


async function loadCart(){

const user=
auth.currentUser;

if(!user){

window.location=
"login.html";

return;

}

const q=query(

collection(
db,
"Cart"
),

where(
"uid",
"==",
user.uid
)

);

const snapshot=
await getDocs(q);

cartItems.innerHTML="";

let total=0;

if(snapshot.empty){

cartItems.innerHTML=

"<h2 style='text-align:center'>Cart Empty</h2>";

return;

}

snapshot.forEach((itemDoc)=>{

const item=
itemDoc.data();

if(!firstProductId){

firstProductId=
item.productId;

}

total+=
Number(item.price);

cartItems.innerHTML+=`

<div class="card">

<img src="${item.image||'logo.png'}">

<div class="details">

<h3>

${item.name}

</h3>

<div class="price">

₹${item.price}

</div>

<p>

Qty :
${item.quantity||1}

</p>

<button
class="remove"
onclick="
removeItem(
'${itemDoc.id}'
)
">

Remove

</button>

</div>

</div>

`;

});

totalDiv.innerText=

`Total : ₹${total}`;

}


window.removeItem=
async(id)=>{

await deleteDoc(
doc(
db,
"Cart",
id
)
);

showPopup(
"Removed",
"Product removed successfully"
);

loadCart();

};


auth.onAuthStateChanged(

(user)=>{

if(user){

loadCart();

}

});


checkoutBtn.onclick=()=>{

if(!firstProductId){

showPopup(
"Cart Empty",
"Please add products"
);

return;

}

window.location=

`checkout.html?id=${firstProductId}`;

};

</script>

</body>
</html>

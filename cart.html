<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot - Cart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:100px;
overflow-x:hidden;
}

/* Animations */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(35px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes cardShow{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

/* Back Button */

.back-container{

padding:15px;

animation:fadeIn .6s ease;

}

.back-btn{

display:inline-flex;
align-items:center;
justify-content:center;

width:45px;
height:45px;

border-radius:50%;

background:white;

font-size:25px;

cursor:pointer;

text-decoration:none;
color:black;

box-shadow:0 2px 10px rgba(0,0,0,.1);

transition:.3s;

}

.back-btn:active{

transform:scale(.92);

}

/* Content */

.cart-header,
#cartItems,
.summary{

animation:fadeIn .5s ease;

}

.cart-header{

padding:0 15px;
font-size:25px;
font-weight:bold;
margin-bottom:15px;

}

#cartItems{

padding:15px;

}

.card{

background:white;
padding:15px;
margin-bottom:15px;

border-radius:20px;

display:flex;
gap:15px;

box-shadow:0 3px 15px rgba(0,0,0,.08);

opacity:0;

animation:cardShow .9s forwards;

transition:.4s;

}

.card:hover{

transform:translateY(-5px);

}

.card img{

width:100px;
height:100px;

border-radius:12px;

object-fit:cover;

}

.details{

flex:1;

}

.price{

margin:10px 0;

font-size:20px;
font-weight:bold;

color:#2e7d32;

}

.remove{

padding:10px 15px;

border:none;
border-radius:10px;

background:#e53935;

color:white;

cursor:pointer;

transition:.3s;

}

.remove:active{

transform:scale(.95);

}

/* Summary */

.summary{

position:fixed;

bottom:75px;
left:0;

width:100%;

background:white;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.total{

font-size:22px;
font-weight:bold;

color:#2e7d32;

margin-bottom:10px;

}

.checkout{

width:100%;

padding:14px;

border:none;
border-radius:15px;

background:#2e7d32;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

.checkout:hover{

opacity:.9;

}

.checkout:active{

transform:scale(.97);

}

/* Bottom Navbar */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

z-index:999;

}

.bottom-nav a{

text-decoration:none;

color:black;

font-size:14px;

text-align:center;

transition:.3s;

}

.bottom-nav a:active{

transform:scale(.9);

}

.active{

color:#2e7d32;
font-weight:bold;

}

/* Popup */

.popup-container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:9999;

}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .3s;

}

.popup-logo{

width:80px;
height:80px;

border-radius:50%;

border:2px solid #2e7d32;

margin-bottom:15px;

}

.popup h2{

margin-bottom:10px;
color:#2e7d32;

}

.popup p{

margin-bottom:20px;

}

.popup button{

padding:12px 30px;

border:none;
border-radius:10px;

background:#2e7d32;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="back-container">

<a href="javascript:history.back()"
class="back-btn">

←

</a>

</div>

<div class="cart-header">

🛒 My Cart

</div>

<div id="cartItems">

Loading...

</div>

<div class="summary">

<div
class="total"
id="total">

Total : ₹0

</div>

<button
class="checkout"
id="checkoutBtn">

Proceed To Checkout

</button>

</div>





<div
id="popupBox"
class="popup-container">

<div class="popup">

<img src="logo.png"
class="popup-logo">

<h2 id="popupTitle"></h2>

<p id="popupMessage"></p>

<button onclick="closePopup()">

OK

</button>

</div>

</div>

<script>

function showPopup(
title,
message
){

popupTitle.innerText=
title;

popupMessage.innerText=
message;

popupBox.style.display=
"flex";

}

function closePopup(){

popupBox.style.display=
"none";

}

</script>

<script
type="module"
src="js/cart.js">

</script>

</body>
</html>

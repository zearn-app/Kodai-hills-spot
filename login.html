<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo{
font-size:32px;
font-weight:bold;
text-align:center;
color:#2e7d32;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Kodai Hills Spot 🌿
</div>

<!-- Step 1 -->

<div id="phoneBox">

<input
id="phone"
placeholder="Phone Number">

<div id="recaptcha-container"
style="margin-top:10px;margin-bottom:10px;">
</div>

<div
id="recaptcha-container">
</div>

<button
id="sendOtpBtn">

Send OTP

</button>

</div>


<!-- Step 2 -->

<div
id="otpBox"
class="hidden">

<input
id="otp"
placeholder="Enter OTP">

<button
id="verifyBtn">

Verify OTP

</button>

</div>


<!-- Step 3 -->

<div
id="detailsBox"
class="hidden">

<input
id="name"
placeholder="Full Name">

<input
id="email"
placeholder="Gmail">

<button
id="saveBtn">

Continue

</button>

</div>

</div>

<script type="module"
src="js/auth.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo{
font-size:32px;
font-weight:bold;
text-align:center;
color:#2e7d32;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-size:18px;
margin-top:10px;
cursor:pointer;
cursor:pointer;
}

.toggle{
text-align:center;
margin-top:15px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Kodai Hills Spot 🌿
</div>


<!-- Signup -->

<div id="signupBox">

<input
id="name"
placeholder="Full Name">

<input
id="email"
placeholder="Gmail">

<input
id="password"
type="password"
placeholder="Password">

<button id="signupBtn">

Sign Up

</button>

</div>


<!-- Login -->

<div
id="loginBox"
class="hidden">

<input
id="loginEmail"
placeholder="Gmail">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button
id="loginBtn">

Login

</button>

</div>


<p
class="toggle"
onclick="toggleForm()"
id="toggleText">

Already have account? Login

</p>

</div>


<script>

function toggleForm(){

let signup=
document.getElementById(
"signupBox"
);

let login=
document.getElementById(
"loginBox"
);

let text=
document.getElementById(
"toggleText"
);

if(login.classList.contains(
"hidden"
)){

signup.classList.add(
"hidden"
);

login.classList.remove(
"hidden"
);

text.innerText=
"Don't have account? Sign Up";

}

else{

login.classList.add(
"hidden"
);

signup.classList.remove(
"hidden"
);

text.innerText=
"Already have account? Login";

}

}

</script>

<script
type="module"
src="js/auth.js">

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{

width:90%;
max-width:400px;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,.1);

}

.logo{

text-align:center;

font-size:25px;

font-weight:bold;

margin-bottom:20px;

color:#2e7d32;

}

input{

width:100%;

padding:12px;

margin:8px 0;

border:1px solid #ddd;

border-radius:10px;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:10px;

margin-top:10px;

background:#2e7d32;

color:white;

font-size:16px;

}

.toggle{

text-align:center;

margin-top:15px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

Kodai Hills Spot 🌿

</div>

<div id="signupBox">

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<input id="address" placeholder="Address">

<input id="email" placeholder="Gmail">

<input id="password" type="password" placeholder="Password">

<button id="signupBtn">

Sign Up

</button>

</div>

<div id="loginBox" style="display:none;">

<input id="loginEmail" placeholder="Gmail">

<input id="loginPassword"

type="password"

placeholder="Password">

<button id="loginBtn">

Login

</button>

</div>

<p class="toggle"

onclick="toggleForm()">

Already have account? Login

</p>

</div>

<script>

function toggleForm(){

let signup=

document.getElementById(
"signupBox"
);

let login=

document.getElementById(
"loginBox"
);

if(signup.style.display!="none"){

signup.style.display="none";

login.style.display="block";

}
else{

signup.style.display="block";

login.style.display="none";

}

}

</script>

<script type="module"
src="js/auth.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kodai Hills Spot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo-container{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo-img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid #2e7d32;
padding:3px;
background:white;
}

.logo{
font-size:32px;
font-weight:bold;
text-align:center;
color:#2e7d32;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
outline:none;
}

input:focus{
border:1px solid #2e7d32;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

.toggle{
text-align:center;
margin-top:20px;
cursor:pointer;
font-size:16px;
color:#333;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-container">
<img src="logo.png" class="logo-img">
</div>

<div class="logo">
Kodai Hills Spot 🌿
</div>

<!-- SIGNUP -->
<div id="signupBox">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" type="email" placeholder="Gmail">
<input id="password" type="password" placeholder="Password">

<button id="signupBtn">Sign Up</button>
</div>

<!-- LOGIN -->
<div id="loginBox" style="display:none">

<input id="loginEmail" type="email" placeholder="Gmail">
<input id="loginPassword" type="password" placeholder="Password">

<!-- OTP SECTION (FIXED) -->
<div id="recaptcha-container"></div>

<input id="otp" placeholder="Enter OTP" style="display:none">

<button id="sendOtpBtn">Send OTP</button>

<button id="verifyOtpBtn" style="display:none">
Verify OTP
</button>

<button id="loginBtn">Login</button>

</div>

<p class="toggle" id="toggleText" onclick="toggleForm()">
Already have an account? Login
</p>

</div>

<script>
function toggleForm(){

const signup = document.getElementById("signupBox");
const login = document.getElementById("loginBox");
const text = document.getElementById("toggleText");

if(signup.style.display === "none"){
signup.style.display = "block";
login.style.display = "none";
text.innerText = "Already have an account? Login";
}else{
signup.style.display = "none";
login.style.display = "block";
text.innerText = "Don't have an account? Sign Up";
}
}

/* 👉 FIX: show OTP fields when needed */
document.getElementById("sendOtpBtn").addEventListener("click", function () {
document.getElementById("otp").style.display = "block";
document.getElementById("verifyOtpBtn").style.display = "block";
});
</script>

<script type="module" src="js/auth.js"></script>

</body>
</html>

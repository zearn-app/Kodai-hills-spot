<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kodai Hills Spot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #ddd;
border-radius:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-size:18px;
cursor:pointer;
}

#otp, #verifyOtpBtn{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Kodai Hills Spot 🌿</h2>

<input id="phone" placeholder="Phone Number">
<input id="otp" placeholder="Enter OTP">

<button id="signupBtn">Send OTP</button>
<button id="verifyOtpBtn">Verify OTP</button>

<div id="recaptcha-container"></div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>

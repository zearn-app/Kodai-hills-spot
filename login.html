<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

/* Animations */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes slideIn{

from{
opacity:0;
transform:translateX(30px);
}

to{
opacity:1;
transform:translateX(0);
}

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.7);
}

to{
opacity:1;
transform:scale(1);
}

}

.container{

width:100%;
max-width:400px;

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

animation:fadeIn .7s ease;

}

.logo{

font-size:32px;

font-weight:bold;

text-align:center;

color:#2e7d32;

margin-bottom:25px;

animation:slideIn .8s ease;

}

input{

width:100%;

padding:14px;

margin:8px 0;

border:1px solid #ddd;

border-radius:12px;

font-size:16px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#2e7d32;

box-shadow:0 0 10px rgba(46,125,50,.2);

transform:scale(1.02);

}

button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#2e7d32;

color:white;

font-size:18px;

margin-top:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

opacity:.9;

}

button:active{

transform:scale(.97);

}

.toggle{

display:block;

text-align:center;

margin-top:20px;

cursor:pointer;

color:#2e7d32;

font-weight:bold;

font-size:15px;

transition:.3s;

}

.toggle:hover{

opacity:.7;

}

.hidden{

display:none;

}

#signupBox,
#loginBox{

animation:fadeIn .5s ease;

}

/* Forgot Password */

#forgotPassword{

margin-top:12px;

text-align:center;

color:#2e7d32;

font-weight:bold;

cursor:pointer;

}

/* Popup */

.popup-container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:9999;

}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .3s;

}

.popup h2{

color:#2e7d32;

margin-bottom:10px;

}

.popup p{

margin-bottom:20px;

color:#555;

}

.popup button{

padding:12px;

border:none;

border-radius:10px;

background:#2e7d32;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

Kodai Hills Spot 🌿

</div>


<!-- Signup -->

<div id="signupBox">

<input
id="name"
placeholder="Full Name">

<input
id="email"
placeholder="Gmail">

<input
id="password"
type="password"
placeholder="Password">

<button id="signupBtn">

Sign Up

</button>

</div>



<!-- Login -->

<div
id="loginBox"
class="hidden">

<input
id="loginEmail"
placeholder="Gmail">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button
id="loginBtn">

Login

</button>

<p id="forgotPassword">

Forgot Password?

</p>

</div>



<!-- Toggle -->

<p
class="toggle"
onclick="toggleForm()"
id="toggleText">

Already have account? Login

</p>



<!-- Popup -->

<div
id="popupBox"
class="popup-container">

<div class="popup">

<h2 id="popupTitle">

Message

</h2>

<p id="popupMessage">

Hello

</p>

<button
onclick="closePopup()">

OK

</button>

</div>

</div>



<script>

/* Toggle */

function toggleForm(){

let signup=
document.getElementById(
"signupBox"
);

let login=
document.getElementById(
"loginBox"
);

let text=
document.getElementById(
"toggleText"
);


if(

login.classList.contains(
"hidden"

)

){

signup.classList.add(
"hidden"
);

login.classList.remove(
"hidden"
);

login.style.animation=
"fadeIn .5s ease";

text.innerText=
"Don't have account? Sign Up";

}

else{

login.classList.add(
"hidden"
);

signup.classList.remove(
"hidden"
);

signup.style.animation=
"fadeIn .5s ease";

text.innerText=
"Already have account? Login";

}

}


/* Popup */

window.showPopup=(

title,
message

)=>{

document.getElementById(
"popupTitle"
).innerText=
title;

document.getElementById(
"popupMessage"
).innerText=
message;

document.getElementById(
"popupBox"
).style.display=
"flex";

};


window.closePopup=()=>{

document.getElementById(
"popupBox"
).style.display=
"none";

};



<!-- Reset Password Popup -->

<div
id="resetPopup"
class="popup-container">

<div class="popup">

<h2>
Reset Password
</h2>

<p>
Enter your Gmail address
</p>

<input
id="resetEmail"
type="email"
placeholder="Enter Gmail">

<button
id="sendResetBtn">

Send Link

</button>

<button
onclick="closeResetPopup()"
style="margin-top:10px;background:#999;">

Cancel

</button>

</div>

</div>

</script>


<script
type="module"
src="js/auth.js">

</script>

</body>
</html>

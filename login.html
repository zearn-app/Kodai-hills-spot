<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OTP Debug</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:350px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}

#otp,#verifyOtpBtn{
display:none;
}

#debug{
margin-top:10px;
font-size:12px;
background:#111;
color:#0f0;
padding:10px;
height:120px;
overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h3>Kodai Hills Spot 🌿</h3>

<input id="phone" placeholder="Phone Number">
<input id="otp" placeholder="Enter OTP">

<button id="signupBtn">Send OTP</button>
<button id="verifyOtpBtn">Verify OTP</button>

<div id="recaptcha-container"></div>

<div id="debug">Logs:</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.navbar{

background:white;
padding:15px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 2px 10px rgba(0,0,0,.1);

position:sticky;
top:0;
z-index:100;

}

.logo-box{

display:flex;
align-items:center;
gap:10px;

}

.logo-img{

width:50px;
height:50px;
border-radius:50%;
object-fit:cover;

}

.logo-text{

font-size:22px;
font-weight:bold;
color:#2e7d32;

}

.menu{

font-size:30px;
cursor:pointer;

}

.hero{

padding:30px 20px;
text-align:center;

}

.hero h1{

font-size:30px;
margin-bottom:10px;

color:#2e7d32;

}

.hero p{

color:gray;
margin-bottom:20px;

}

.shop-btn{

padding:14px 30px;
border:none;
border-radius:30px;
background:#2e7d32;
color:white;
font-size:16px;

}

.search{

padding:20px;

}

.search input{

width:100%;
padding:15px;

border:none;
border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.section{

padding:20px;

}

.section-title{

font-size:22px;
font-weight:bold;
margin-bottom:15px;

}

.categories{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;

}

.category{

background:white;
padding:20px;
border-radius:15px;
text-align:center;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.products{

display:flex;
overflow:auto;
gap:10px;

}

.product-card{

min-width:180px;
background:white;
padding:10px;
border-radius:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.product-card img{

width:100%;
height:120px;
border-radius:10px;
object-fit:cover;

}

.product-card h3{

margin-top:10px;

}

.footer{

margin-top:30px;
padding:20px;
text-align:center;
background:white;

}

</style>

</head>

<body>


<nav class="navbar">

<div class="logo-box">

<img src="assets/logo.png"
class="logo-img">

<div class="logo-text">

Kodai Hills Spot

</div>

</div>

<div class="menu">

☰

</div>

</nav>



<section class="hero">

<h1>

Fresh Products from Kodaikanal Hills

</h1>

<p>

Natural products directly from Kodai

</p>

<button class="shop-btn">

Shop Now

</button>

</section>


<div class="search">

<input placeholder="Search products...">

</div>



<section class="section">

<div class="section-title">

Categories

</div>

<div class="categories">

<div class="category">
🍫 Chocolates
</div>

<div class="category">
🍯 Honey
</div>

<div class="category">
🌿 Herbs
</div>

<div class="category">
🧴 Oils
</div>

</div>

</section>



<section class="section">

<div class="section-title">

Featured Products

</div>

<div class="products">

<div class="product-card">

<img src="https://images.unsplash.com/photo-1511381939415-e44015466834">

<h3>Homemade Chocolate</h3>

<p>₹250</p>

</div>

<div class="product-card">

<img src="https://images.unsplash.com/photo-1587049352851-8d4e89133924">

<h3>Kodai Honey</h3>

<p>₹350</p>

</div>

</div>

</section>



<div class="footer">

© Kodai Hills Spot 🌿

</div>


</body>
</html>

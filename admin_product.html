<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{display:none;background:#f0f4f0;padding:16px 16px 60px;}

#authLoader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#f0f4f0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;
}
.loader-spinner{
  width:32px;height:32px;border:3px solid #c8e6c9;
  border-top-color:#2e7d32;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:14px;color:#888;margin-top:10px;}

.navbar{
  background:white;padding:14px 16px;border-radius:16px;
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.back-btn{background:#f0f4f0;border:none;border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:#2e7d32;font-weight:700;}
.navbar-title{font-size:17px;font-weight:700;color:#1a1a1a;}

.container{background:white;border-radius:16px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.container h2{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:14px;}
.section-heading{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.7px;margin:20px 0 10px;}

input,select,textarea{width:100%;padding:12px 14px;margin-bottom:10px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;background:white;}
input:focus,select:focus,textarea:focus{border-color:#2e7d32;}
textarea{min-height:80px;resize:vertical;}

button.primary{width:100%;padding:13px;background:#2e7d32;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}

.stockBox{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.stockBox input{width:auto;margin-bottom:0;}
.stockBox label{font-size:14px;color:#444;}

.variant-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.variant-row input{margin-bottom:0;flex:1;}
.variant-row button{width:40px;height:40px;flex-shrink:0;background:red;color:white;border:none;border-radius:10px;cursor:pointer;font-size:14px;}
#addVariantBtn{background:#2196f3;color:white;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px;width:auto;}

.cat-add-row{display:flex;gap:8px;margin-bottom:12px;}
.cat-add-row input{margin-bottom:0;flex:1;}
.cat-add-row button{white-space:nowrap;width:auto;padding:10px 14px;background:#2e7d32;color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#f0f7f0;border:1.5px solid #c8e6c9;border-radius:20px;font-size:13px;color:#2e7d32;font-weight:500;}
.chip.builtin{background:#f5f5f5;border-color:#e0e0e0;color:#888;}
.chip-del{background:none;border:none;color:#c62828;font-size:15px;cursor:pointer;padding:0;font-weight:700;width:auto;margin:0;}

.product-card{background:white;padding:14px;margin-bottom:14px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.product-card img{width:100%;height:150px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
.product-card h3{font-size:15px;margin-bottom:4px;}
.card-actions{display:flex;gap:8px;margin-top:10px;}
.card-actions button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:white;}
.edit-btn{background:#2196f3;}
.del-btn{background:red;}

.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000;padding:16px;}
.popup-box{background:white;width:100%;max-height:90vh;overflow-y:auto;padding:20px;border-radius:20px;}
.popup-box h2{font-size:16px;font-weight:700;margin-bottom:14px;}
.popup-close{float:right;background:red;color:white;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div id="authLoader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Checking access…</div>
</div>

<nav class="navbar">
  <button class="back-btn" onclick="window.location='admin.html'">‹</button>
  <span class="navbar-title">Products</span>
</nav>

<div class="container">
  <h2>Add Product</h2>
  <input id="name" placeholder="Product Name *">
  <input id="price" placeholder="Current Price *" type="number">
  <input id="oldPrice" placeholder="Old Price (optional)" type="number">
  <input id="packQty" placeholder="Pack Quantity (500g / 1kg / 250ml)">
  <div class="stockBox">
    <input type="checkbox" id="enableVariants">
    <label>Enable Multiple Quantity Options</label>
  </div>
  <div id="variantSection" style="display:none;">
    <button type="button" id="addVariantBtn">+ Add Quantity Option</button>
    <div id="variantFields"></div>
  </div>
  <select id="category"></select>
  <input id="image" placeholder="Image URL *">
  <textarea id="description" placeholder="Description *"></textarea>
  <div class="stockBox"><input type="checkbox" id="fewStock"><label>⚠️ Few Stock Available</label></div>
  <div class="stockBox"><input type="checkbox" id="freeDelivery"><label>🚚 Free Delivery</label></div>
  <button class="primary" id="addBtn">Add Product</button>
</div>

<p class="section-heading">Categories</p>
<div class="container">
  <div class="cat-add-row">
    <input id="newCategoryInput" placeholder="New category name…">
    <button id="addCategoryBtn">+ Add</button>
  </div>
  <div class="chips" id="categoryChips"></div>
</div>

<p class="section-heading">All Products</p>
<div id="products"><p style="color:#aaa;padding:10px;">Loading…</p></div>

<!-- Edit Popup -->
<div class="popup-overlay" id="editPopup">
  <div class="popup-box">
    <button class="popup-close" onclick="closeEdit()">✕ Close</button>
    <h2>Edit Product</h2>
    <input id="editName" placeholder="Product Name">
    <input id="editPrice" placeholder="Price" type="number">
    <input id="editOldPrice" placeholder="Old Price" type="number">
    <input id="editPackQty" placeholder="Pack Quantity">
    <input id="editImage" placeholder="Image URL">
    <textarea id="editDescription" placeholder="Description"></textarea>
    <label style="font-size:13px;color:#555;font-weight:600;display:block;margin-bottom:4px;">Category</label>
    <select id="editCategory"></select>
    <div class="stockBox" style="margin-top:6px;"><input type="checkbox" id="editFewStock"><label>⚠️ Few Stock Available</label></div>
    <div class="stockBox"><input type="checkbox" id="editFreeDelivery"><label>🚚 Free Delivery</label></div>
    <button class="primary" id="saveEditBtn" style="margin-top:10px;">Save Changes</button>
  </div>
</div>

<script type="module" src="js/admin_product.js"></script>
</body>
</html>

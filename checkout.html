<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{

background:white;

padding:20px;

border-radius:20px;

}

input,select,button{

width:100%;

padding:15px;

margin-top:15px;

border-radius:12px;

}

button{

background:#2e7d32;
border:none;
color:white;

}

</style>

</head>

<body>

<div class="card">

<h2>

Checkout

</h2>

<input
id="address"
placeholder="Delivery Address">

<select id="payment">

<option>

Cash On Delivery

</option>

<option>

UPI

</option>

</select>

<button id="placeOrder">

Place Order

</button>

</div>


<script type="module"
src="js/checkout.js">
</script>

</body>

</html>

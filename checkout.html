<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot - Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:100px;
}

.header{
background:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
width:45px;
height:45px;
border-radius:50%;
border:2px solid #2e7d32;
object-fit:cover;
}

.title{
font-size:22px;
font-weight:bold;
color:#2e7d32;
}

.section{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.heading{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.product{
display:flex;
gap:15px;
align-items:center;
}

.product img{
width:90px;
height:90px;
border-radius:12px;
object-fit:cover;
}

.details{
flex:1;
}

.price{
color:#2e7d32;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

input,select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-top:10px;
outline:none;
}

.payment-box{
background:#f5f5f5;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.total{
font-size:22px;
font-weight:bold;
color:#2e7d32;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.place-btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#2e7d32;
color:white;
font-size:18px;
font-weight:bold;
}

.addressCard{
background:#f5f5f5;
padding:15px;
border-radius:15px;
line-height:28px;
}

.hidden{
display:none;
}

.changeBtn{
margin-top:10px;
padding:10px;
width:100%;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<img src="assets/logo.png" class="logo">

<div class="title">
Kodai Hills Spot
</div>

</div>


<div class="section">

<div class="heading">
📦 Delivery Address
</div>

<div id="savedAddress" class="addressCard hidden">

<div id="addressText"></div>

<button
class="changeBtn"
onclick="changeAddress()">

Change Address

</button>

</div>


<div id="addressForm">

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<select id="state">
<option value="">Select State</option>
<option>Tamil Nadu</option>
<option>Kerala</option>
<option>Karnataka</option>
</select>

<input
id="district"
placeholder="District">

<input
id="area"
placeholder="Area">

<input
id="street"
placeholder="Street">

<input
id="pincode"
placeholder="Pincode">

</div>

</div>



<div class="section">

<div class="heading">
🛍 Order Item
</div>

<div class="product">

<img id="productImage">

<div class="details">

<h3 id="productName">
Loading...
</h3>

<div
class="price"
id="productPrice">
₹0
</div>

<p id="productQty">
Qty : 1
</p>

</div>

</div>

</div>



<div class="section">

<div class="heading">
💳 Payment Method
</div>

<div class="payment-box">

<select id="payment">

<option>
Cash On Delivery
</option>

<option>
UPI
</option>

<option>
Debit Card
</option>

<option>
Credit Card
</option>

</select>

</div>

</div>



<div class="section">

<div class="heading">
🧾 Order Summary
</div>

<div class="row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<div class="row">
<span>Delivery</span>
<span>₹40</span>
</div>

<hr style="margin:10px 0">

<div class="row total">
<span>Total</span>
<span id="total">₹0</span>
</div>

</div>


<div class="bottom">

<button
class="place-btn"
id="placeOrder">

Place Order →

</button>

</div>


<script>

function changeAddress(){

document.getElementById(
"savedAddress"
).classList.add(
"hidden"
);

document.getElementById(
"addressForm"
).classList.remove(
"hidden"
);

}

</script>

<script type="module" src="js/checkout.js"></script>

</body>
</html>

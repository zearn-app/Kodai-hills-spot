<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orders — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{display:none;background:#f0f4f0;padding-top:0;padding-bottom:60px;}

#authLoader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#f0f4f0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;
}
.loader-spinner{width:32px;height:32px;border:3px solid #c8e6c9;border-top-color:#2e7d32;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:14px;color:#888;margin-top:10px;}

/* ── Sticky top bar ── */
.sticky-top{
  position:sticky;top:0;z-index:100;
  background:#f0f4f0;padding:12px 16px 0;
}

.navbar{
  background:white;padding:14px 16px;border-radius:16px;
  display:flex;align-items:center;gap:12px;margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.back-btn{background:#f0f4f0;border:none;border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:#2e7d32;font-weight:700;}
.navbar-title{font-size:17px;font-weight:700;color:#1a1a1a;flex:1;}
.order-count{font-size:13px;color:#888;white-space:nowrap;}

/* Search */
.search-wrap{position:relative;margin-bottom:10px;}
.search-bar{
  width:100%;padding:13px 14px 13px 40px;border:1.5px solid #e0e0e0;
  border-radius:12px;font-size:14px;outline:none;background:white;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.search-bar:focus{border-color:#2e7d32;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.search-clear{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  font-size:18px;cursor:pointer;color:#aaa;display:none;
  background:none;border:none;padding:0;line-height:1;
}

/* Filter chips */
.filter-row{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;
  scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  white-space:nowrap;padding:8px 14px;border-radius:20px;
  border:1.5px solid #e0e0e0;background:white;font-size:13px;
  font-weight:600;color:#888;cursor:pointer;flex-shrink:0;
  transition:all .18s;display:flex;align-items:center;gap:5px;
}
.filter-chip:active{transform:scale(.96);}
.filter-chip.active{border-color:transparent;color:white;}
.filter-chip[data-status="All"].active          {background:#2e7d32;}
.filter-chip[data-status="Order Placed"].active {background:#856404;}
.filter-chip[data-status="Accepted"].active     {background:#155724;}
.filter-chip[data-status="Dispatched"].active   {background:#004085;}
.filter-chip[data-status="Received"].active     {background:#0a5c36;}

.chip-count{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.15);border-radius:10px;
  padding:1px 7px;font-size:11px;min-width:20px;
  transition:transform .2s;
}
.chip-count.pop{animation:popBadge .25s ease;}
@keyframes popBadge{0%{transform:scale(1.4);}100%{transform:scale(1);}}

/* Scrollable content area */
.orders-area{padding:0 16px 16px;}

/* Status section headers */
.status-section-header{
  display:flex;align-items:center;gap:8px;
  padding:6px 0 8px;margin-top:4px;
}
.status-section-label{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:#aaa;
}
.status-section-line{flex:1;height:1px;background:#e8e8e8;}

/* Order cards */
.order-card{
  background:white;padding:14px;margin-bottom:12px;
  border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);
  animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.order-name{font-size:15px;font-weight:700;color:#1a1a1a;}
.order-date{font-size:12px;color:#aaa;margin-top:2px;}
.status-badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.order-meta{font-size:13px;color:#555;margin-bottom:3px;}
.order-id{font-size:11px;color:#bbb;margin-top:4px;}
.manage-btn{margin-top:10px;width:100%;padding:11px;background:#2e7d32;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.manage-btn:active{background:#1b5e20;}

.no-results{text-align:center;padding:50px 20px;color:#bbb;font-size:14px;}
.no-results div{font-size:36px;margin-bottom:10px;}

/* ── Popup ── */
.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:flex-end;z-index:1000;}
.popup-sheet{background:white;width:100%;max-height:92vh;overflow-y:auto;padding:20px;border-radius:24px 24px 0 0;}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.popup-sheet h3{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:12px;}
.detail{padding:10px 12px;background:#f8f8f8;border-radius:10px;margin-bottom:8px;font-size:13px;color:#444;}
.detail b{display:block;font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.popup-sheet select,.popup-sheet input[type=text]{width:100%;padding:12px 14px;margin-top:10px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;background:white;}
.popup-sheet select:focus,.popup-sheet input:focus{border-color:#2e7d32;}
.update-btn{width:100%;padding:13px;margin-top:12px;background:#2e7d32;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
.close-btn{width:100%;padding:13px;margin-top:8px;background:red;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div id="authLoader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Checking access…</div>
</div>

<!-- ── Sticky top: navbar + search + chips ── -->
<div class="sticky-top">
  <nav class="navbar">
    <button class="back-btn" onclick="window.location='admin.html'">‹</button>
    <span class="navbar-title">Orders</span>
    <span class="order-count" id="orderCount"></span>
  </nav>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-bar" id="searchInput" placeholder="Search by name, phone, ID…">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-chip active" data-status="All">
      All <span class="chip-count" id="countAll">0</span>
    </button>
    <button class="filter-chip" data-status="Order Placed">
      🟡 Order Placed <span class="chip-count" id="countOrderPlaced">0</span>
    </button>
    <button class="filter-chip" data-status="Accepted">
      ✅ Accepted <span class="chip-count" id="countAccepted">0</span>
    </button>
    <button class="filter-chip" data-status="Dispatched">
      🚚 Dispatched <span class="chip-count" id="countDispatched">0</span>
    </button>
    <button class="filter-chip" data-status="Received">
      📦 Received <span class="chip-count" id="countReceived">0</span>
    </button>
  </div>
</div>

<!-- ── Order list ── -->
<div class="orders-area">
  <div id="allOrders"><p style="color:#aaa;padding:10px;">Loading…</p></div>
</div>

<!-- ── Manage popup ── -->
<div class="popup-overlay" id="statusPopup">
  <div class="popup-sheet">
    <div class="sheet-handle"></div>
    <h3>Manage Order</h3>
    <div class="detail"><b>Order ID</b><span id="orderId"></span></div>
    <div class="detail"><b>Product</b><span id="productName"></span></div>
    <div class="detail"><b>Quantity</b><span id="quantity"></span></div>
    <div class="detail"><b>Total</b><span id="totalPrice"></span></div>
    <h3 style="margin-top:14px;">Customer</h3>
    <div class="detail"><b>Name</b><span id="userName"></span></div>
    <div class="detail"><b>Email</b><span id="userEmail"></span></div>
    <div class="detail"><b>Phone</b><span id="userPhone"></span></div>
    <div class="detail"><b>Address</b><span id="userAddress"></span></div>
    <select id="statusSelect"></select>
    <input type="text" id="trackingId" placeholder="Enter Tracking ID" style="display:none;">
    <button class="update-btn" id="updateBtn">Update Order</button>
    <button class="close-btn" onclick="closePopup()">Close</button>
  </div>
</div>

<script type="module" src="js/admin_orders.js"></script>
</body>
</html>

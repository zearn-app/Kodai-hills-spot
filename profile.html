<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f4f3;
padding:20px;
padding-bottom:100px;
overflow-x:hidden;
animation:pageFade .8s ease;
}

/* Animations */

@keyframes pageFade{
from{
opacity:0;
}
to{
opacity:1;
}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-5px);
}
100%{
transform:translateY(0px);
}
}

@keyframes infoShow{
from{
opacity:0;
transform:translateX(-40px);
}
to{
opacity:1;
transform:translateX(0);
}
}

/* Profile Card */

.profile-card{

background:white;
border-radius:25px;
padding:30px 20px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

animation:slideUp .7s ease;

}

.profile-top{

display:flex;
flex-direction:column;
align-items:center;
margin-bottom:25px;

}

.profile-img{

width:110px;
height:110px;

border-radius:50%;

border:4px solid #2e7d32;

padding:5px;

object-fit:cover;

margin-bottom:15px;

background:white;

animation:float 3s infinite;

transition:.4s;

}

.profile-img:hover{

transform:scale(1.08);

}

.name{

font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-bottom:5px;

}

.subtitle{

color:gray;
font-size:14px;

}

/* Information boxes */

.info{

background:#f8f8f8;
padding:16px;
border-radius:15px;
margin-top:15px;

display:flex;
align-items:center;
gap:10px;

font-size:15px;

box-shadow:0 2px 5px rgba(0,0,0,.05);

animation:infoShow .7s ease forwards;

opacity:0;

transition:.3s;

}

.info:nth-child(1){
animation-delay:.2s;
}

.info:nth-child(2){
animation-delay:.4s;
}

.info:nth-child(3){
animation-delay:.6s;
}

.info:hover{

transform:translateY(-4px);

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.label{

font-weight:bold;
color:#2e7d32;
min-width:80px;

}

.value{

color:#333;
word-break:break-word;

}

/* Buttons */

.menu-btn{

width:100%;
padding:15px;

border:none;
border-radius:14px;

margin-top:15px;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.3s;

animation:slideUp .8s ease;

}

.menu-btn:hover{

transform:translateY(-3px);

}

.menu-btn:active{

transform:scale(.97);

}

.orders{

background:#2e7d32;
color:white;

}

.edit{

background:#ff9800;
color:white;

}

.logout{

background:#e53935;
color:white;

}

/* Bottom Navigation */

.bottom-nav{

position:fixed;
left:0;
bottom:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:14px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

animation:slideUp .8s ease;

}

.bottom-nav a{

text-decoration:none;
color:#555;

font-size:13px;

text-align:center;

transition:.3s;

}

.bottom-nav a:hover{

transform:translateY(-3px);

}

.bottom-nav a:active{

transform:scale(.92);

}

.active{

color:#2e7d32;
font-weight:bold;

}

</style>

</head>

<body>

<div class="profile-card">

<div class="profile-top">

<img
src="assets/logo.png"
class="profile-img">

<div
class="name"
id="name">

Loading...

</div>

<div class="subtitle">

My Account

</div>

</div>


<div class="info">

<div class="label">
📧 Email
</div>

<div
class="value"
id="email">

Loading...

</div>

</div>


<div class="info">

<div class="label">
📱 Phone
</div>

<div
class="value"
id="phone">

Loading...

</div>

</div>


<div class="info">

<div class="label">
🏠 Address
</div>

<div
class="value"
id="address">

Loading...

</div>

</div>


<button
class="menu-btn edit"
id="editProfileBtn">

✏️ Edit Profile

</button>


<button
class="menu-btn logout"
id="logoutBtn">

🚪 Logout

</button>


<button
class="menu-btn orders"
onclick="window.location='orders.html'">

📦 My Orders

</button>

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>
Home

</a>

<a href="products.html">

🛍️<br>
Products

</a>

<a href="cart.html">

🛒<br>
Cart

</a>

<a
href="profile.html"
class="active">

👤<br>
Profile

</a>

</nav>


<script type="module">

import {db,auth}
from "./js/firebase.js";

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const nameEl=document.getElementById("name");
const emailEl=document.getElementById("email");
const phoneEl=document.getElementById("phone");
const addressEl=document.getElementById("address");
const logoutBtn=document.getElementById("logoutBtn");
const editBtn=document.getElementById("editProfileBtn");


onAuthStateChanged(

auth,

async(user)=>{

if(!user){

window.location="login.html";
return;

}

try{

const userRef=
doc(
db,
"Users",
user.uid
);

const snapshot=
await getDoc(userRef);

if(snapshot.exists()){

const data=
snapshot.data();

nameEl.innerText=
data.name || "No Name";

emailEl.innerText=
data.email || user.email;

phoneEl.innerText=
data.phone || "Not Added";


if(data.address){

let addressText=`

${data.address.street||""},

${data.address.area||""},

${data.address.district||""},

${data.address.state||""}

- ${data.address.pincode||""}

`;

addressEl.innerText=
addressText;

}
else{

addressEl.innerText=
"Address not added";

}

}
else{

nameEl.innerText=
"No user data found";

}

}
catch(error){

console.log(error);

alert(error.message);

}

});


editBtn.onclick=()=>{

window.location=
"edit-profile.html";

};


logoutBtn.onclick=

async()=>{

try{

await signOut(auth);

window.location=
"login.html";

}
catch(error){

alert(error.message);

}

};

</script>

</body>
</html>

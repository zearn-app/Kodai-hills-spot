<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f4f3;
padding:20px;
padding-bottom:100px;
overflow-x:hidden;
}


/* Top Bar */

.top-bar{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:20px;

animation:fadeUp .5s;
}

.page-title{

font-size:28px;
font-weight:bold;
color:#2e7d32;

}

.cart-btn{

width:50px;
height:50px;

display:flex;
justify-content:center;
align-items:center;

background:white;

border-radius:50%;

text-decoration:none;
font-size:24px;

box-shadow:0 4px 10px rgba(0,0,0,.1);

transition:.3s;
}

.cart-btn:active{

transform:scale(.9);

}


/* Animations */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes scaleIn{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.7);
}

to{
opacity:1;
transform:scale(1);
}

}


/* Profile */

.profile-card{

background:white;
border-radius:25px;
padding:30px 20px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

animation:fadeUp .7s ease;

}

.profile-top{

display:flex;
flex-direction:column;
align-items:center;

margin-bottom:25px;

animation:scaleIn .8s;

}

.profile-img{

width:110px;
height:110px;

border-radius:50%;
border:4px solid #2e7d32;

padding:5px;

object-fit:cover;
margin-bottom:15px;

background:white;

transition:.4s;

}

.profile-img:hover{

transform:scale(1.08);

}

.name{

font-size:24px;
font-weight:bold;

color:#2e7d32;

margin-bottom:5px;

}

.subtitle{

color:gray;
font-size:14px;

}


/* Info */

.info{

background:#f8f8f8;
padding:16px;

border-radius:15px;

margin-top:15px;

display:flex;
gap:10px;

box-shadow:0 2px 5px rgba(0,0,0,.05);

transition:.3s;

}

.info:hover{

transform:translateY(-3px);

}

.label{

font-weight:bold;
color:#2e7d32;
min-width:80px;

}


/* Buttons */

.menu-btn{

width:100%;
padding:15px;

border:none;
border-radius:14px;

margin-top:15px;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.3s;

}

.menu-btn:active{

transform:scale(.97);

}

.orders{

background:#2e7d32;
color:white;

}

.edit{

background:#ff9800;
color:white;

}

.logout{

background:#e53935;
color:white;

}


/* Bottom Navigation */

.bottom-nav{

position:fixed;
left:0;
bottom:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:14px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;
color:#555;

font-size:13px;
text-align:center;

}

.active{

color:#2e7d32;
font-weight:bold;

}


/* Popup */

.popup-container{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:9999;

}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .3s;

}

.popup button{

padding:12px 20px;

border:none;
border-radius:10px;

margin:5px;

cursor:pointer;

}

.okBtn{

background:#2e7d32;
color:white;

}

.cancelBtn{

background:#e53935;
color:white;

}

</style>

</head>

<body>


<!-- Top -->

<div class="top-bar">

<div class="page-title">

My Profile

</div>

<a
href="cart.html"
class="cart-btn">

🛒

</a>

</div>



<div class="profile-card">

<div class="profile-top">

<img
src="assets/logo.png"
class="profile-img">

<div
class="name"
id="name">

Loading...

</div>

<div class="subtitle">

My Account

</div>

</div>


<div class="info">

<div class="label">

📧 Email

</div>

<div
class="value"
id="email">

Loading...

</div>

</div>


<div class="info">

<div class="label">

📱 Phone

</div>

<div
class="value"
id="phone">

Loading...

</div>

</div>


<div class="info">

<div class="label">

🏠 Address

</div>

<div
class="value"
id="address">

Loading...

</div>

</div>


<button
class="menu-btn edit"
id="editProfileBtn">

✏️ Edit Profile

</button>


<button
class="menu-btn logout"
id="logoutBtn">

🚪 Logout

</button>


<button
class="menu-btn orders"
onclick="window.location='orders.html'">

📦 My Orders

</button>

</div>



<nav class="bottom-nav">

<a href="index.html">

🏠<br>
Home

</a>

<a href="products.html">

🛍️<br>
Products

</a>

<a
href="profile.html"
class="active">

👤<br>
Profile

</a>

</nav>



<div
id="popupBox"
class="popup-container">

<div class="popup">

<h2 id="popupTitle">

Message

</h2>

<p id="popupMessage"></p>

<div id="popupButtons">

<button
class="okBtn"
onclick="closePopup()">

OK

</button>

</div>

</div>

</div>


<script type="module"
src="js/profile.js">

</script>

</body>
</html>

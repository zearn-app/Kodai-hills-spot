<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:90px;
}

.profile-card{

background:white;

padding:25px;

border-radius:20px;

text-align:center;

box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.profile-img{

width:100px;

height:100px;

border-radius:50%;

object-fit:cover;

border:4px solid #2e7d32;

margin-bottom:15px;

}

.name{

font-size:24px;

font-weight:bold;

color:#2e7d32;

margin-bottom:10px;

}

.info{

background:#f5f5f5;

padding:15px;

border-radius:10px;

margin-top:10px;

text-align:left;

}

.logout{

width:100%;

padding:14px;

margin-top:20px;

border:none;

border-radius:12px;

background:#e53935;

color:white;

font-size:16px;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;
color:black;

}

.active{

color:#2e7d32;
font-weight:bold;

}

</style>

</head>

<body>


<div class="profile-card">

<img src="assets/logo.png"
class="profile-img">

<div class="name"
id="name">

Loading...

</div>

<div class="info">

📧 Email:
<span id="email"></span>

</div>

<div class="info">

📱 Phone:
<span id="phone"></span>

</div>

<div class="info">

🏠 Address:
<span id="address"></span>

</div>

<button class="logout"
id="logoutBtn">

Logout

</button>
<button
onclick="window.location='orders.html'">

📦 My Orders

</button>

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>Home

</a>

<a href="products.html">

🛍️<br>Products

</a>

<a href="cart.html">

🛒<br>Cart

</a>

<a href="profile.html"
class="active">

👤<br>Profile

</a>

</nav>

<script type="module"
src="js/profile.js">
</script>

</body>
</html>

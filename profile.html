<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>My Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:90px;
}

.profile-card{

background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.profile-img{

width:100px;
height:100px;
border-radius:50%;
border:4px solid #2e7d32;
margin-bottom:15px;

}

.name{

font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-bottom:15px;

}

.info{

background:#f7f7f7;
padding:15px;
border-radius:12px;
margin-top:10px;
text-align:left;

}

.menu-btn{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
color:white;

}

.orders{

background:#2e7d32;

}

.settings{

background:#ff9800;

}

.logout{

background:#e53935;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;
color:black;
font-size:14px;
text-align:center;

}

.active{

color:#2e7d32;
font-weight:bold;

}

</style>

</head>

<body>

<div class="profile-card">

<img
src="assets/logo.png"
class="profile-img">

<div
class="name"
id="name">

Loading...

</div>

<div class="info">

📧 Email :
<span id="email"></span>

</div>

<div class="info">

📱 Phone :
<span id="phone"></span>

</div>

<div class="info">

🏠 Address :
<span id="address"></span>

</div>

<button
class="menu-btn orders"
onclick="window.location='orders.html'">

📦 My Orders

</button>

<button
class="menu-btn settings">

⚙ Settings

</button>

<button
class="menu-btn logout"
id="logoutBtn">

Logout

</button>

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>
Home

</a>

<a href="products.html">

🛍️<br>
Products

</a>

<a href="cart.html">

🛒<br>
Cart

</a>

<a
href="profile.html"
class="active">

👤<br>
Profile

</a>

</nav>

<script type="module">

import {db,auth}
from "./js/firebase.js";

import {

doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {

onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const nameEl=
document.getElementById(
"name"
);

const emailEl=
document.getElementById(
"email"
);

const phoneEl=
document.getElementById(
"phone"
);

const addressEl=
document.getElementById(
"address"
);


onAuthStateChanged(

auth,

async(user)=>{

if(!user){

window.location=
"login.html";

return;

}


const snapshot=

await getDoc(

doc(
db,
"users",
user.uid
)

);


if(snapshot.exists()){

const data=
snapshot.data();

nameEl.innerText=
data.name;

emailEl.innerText=
data.email;

phoneEl.innerText=
data.phone;

addressEl.innerText=
data.address;

}

});


document
.getElementById(
"logoutBtn"
)

.onclick=

async()=>{

await signOut(
auth
);

window.location=
"login.html";

};

</script>

</body>

</html>

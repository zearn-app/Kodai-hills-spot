<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>My Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f4f3;
padding:20px;
padding-bottom:100px;
overflow-x:hidden;
}

/* Animations */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes scaleIn{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.7);
}

to{
opacity:1;
transform:scale(1);
}

}

/* Profile Card */

.profile-card{

background:white;
border-radius:25px;
padding:30px 20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);

animation:fadeUp .7s ease;

}

.profile-top{

display:flex;
flex-direction:column;
align-items:center;
margin-bottom:25px;

animation:scaleIn .8s;

}

.profile-img{

width:110px;
height:110px;

border-radius:50%;
border:4px solid #2e7d32;

padding:5px;

object-fit:cover;
margin-bottom:15px;

background:white;

transition:.4s;

}

.profile-img:hover{

transform:scale(1.08);

}

.name{

font-size:24px;
font-weight:bold;
color:#2e7d32;

margin-bottom:5px;

}

.subtitle{

color:gray;
font-size:14px;

}

/* Information */

.info{

background:#f8f8f8;
padding:16px;

border-radius:15px;
margin-top:15px;

display:flex;
align-items:center;

gap:10px;

font-size:15px;

box-shadow:0 2px 5px rgba(0,0,0,.05);

animation:fadeUp .8s ease;

transition:.3s;

}

.info:hover{

transform:translateY(-3px);

}

.label{

font-weight:bold;
color:#2e7d32;
min-width:80px;

}

.value{

color:#333;
word-break:break-word;

}

/* Buttons */

.menu-btn{

width:100%;
padding:15px;

border:none;
border-radius:14px;

margin-top:15px;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.3s;

animation:fadeUp 1s;

}

.menu-btn:hover{

transform:translateY(-2px);

}

.menu-btn:active{

transform:scale(.97);

}

.orders{

background:#2e7d32;
color:white;

}

.edit{

background:#ff9800;
color:white;

}

.logout{

background:#e53935;
color:white;

}

/* Bottom Navigation */

.bottom-nav{

position:fixed;
left:0;
bottom:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:14px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.bottom-nav a{

text-decoration:none;
color:#555;
font-size:13px;
text-align:center;

transition:.3s;

}

.bottom-nav a:active{

transform:scale(.9);

}

.active{

color:#2e7d32;
font-weight:bold;

}

/* Popup */

.popup-container{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:9999;

}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .3s;

}

.popup h2{

color:#2e7d32;
margin-bottom:10px;

}

.popup p{

margin-bottom:20px;

}

.popup button{

padding:12px 20px;

border:none;
border-radius:10px;

margin:5px;

cursor:pointer;

font-weight:bold;

}

.okBtn{

background:#2e7d32;
color:white;

}

.cancelBtn{

background:#e53935;
color:white;

}

</style>

</head>

<body>

<div class="profile-card">

<div class="profile-top">

<img
src="assets/logo.png"
class="profile-img">

<div
class="name"
id="name">

Loading...

</div>

<div class="subtitle">

My Account

</div>

</div>


<div class="info">

<div class="label">

📧 Email

</div>

<div
class="value"
id="email">

Loading...

</div>

</div>


<div class="info">

<div class="label">

📱 Phone

</div>

<div
class="value"
id="phone">

Loading...

</div>

</div>


<div class="info">

<div class="label">

🏠 Address

</div>

<div
class="value"
id="address">

Loading...

</div>

</div>


<button
class="menu-btn edit"
id="editProfileBtn">

✏️ Edit Profile

</button>


<button
class="menu-btn logout"
id="logoutBtn">

🚪 Logout

</button>


<button
class="menu-btn orders"
onclick="window.location='orders.html'">

📦 My Orders

</button>

</div>


<nav class="bottom-nav">

<a href="index.html">

🏠<br>
Home

</a>

<a href="products.html">

🛍️<br>
Products

</a>

<a href="cart.html">

🛒<br>
Cart

</a>

<a
href="profile.html"
class="active">

👤<br>
Profile

</a>

</nav>


<div
id="popupBox"
class="popup-container">

<div class="popup">

<h2 id="popupTitle">

Message

</h2>

<p id="popupMessage">

</p>

<div id="popupButtons">

<button
class="okBtn"
onclick="closePopup()">

OK

</button>

</div>

</div>

</div>


<script type="module">

import {db,auth}
from "./js/firebase.js";

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const nameEl=
document.getElementById("name");

const emailEl=
document.getElementById("email");

const phoneEl=
document.getElementById("phone");

const addressEl=
document.getElementById("address");

const logoutBtn=
document.getElementById("logoutBtn");

const editBtn=
document.getElementById("editProfileBtn");


function showPopup(

title,
message,
logout=false

){

popupTitle.innerText=
title;

popupMessage.innerText=
message;

popupBox.style.display=
"flex";


if(logout){

popupButtons.innerHTML=`

<button
class="okBtn"
id="confirmLogout">

Yes

</button>

<button
class="cancelBtn"
onclick="closePopup()">

Cancel

</button>

`;

document.getElementById(
"confirmLogout"
).onclick=async()=>{

await signOut(auth);

window.location=
"login.html";

};

}

else{

popupButtons.innerHTML=`

<button
class="okBtn"
onclick="closePopup()">

OK

</button>

`;

}

}


window.closePopup=()=>{

popupBox.style.display=
"none";

};


onAuthStateChanged(

auth,

async(user)=>{

if(!user){

window.location=
"login.html";

return;

}

try{

const userRef=

doc(
db,
"Users",
user.uid
);

const snapshot=

await getDoc(
userRef
);


if(snapshot.exists()){

const data=
snapshot.data();

nameEl.innerText=
data.name||"No Name";

emailEl.innerText=
data.email||user.email;

phoneEl.innerText=
data.phone||"Not Added";


if(data.address){

addressEl.innerText=`

${data.address.street||""},

${data.address.area||""},

${data.address.district||""},

${data.address.state||""}

- ${data.address.pincode||""}

`;

}

else{

addressEl.innerText=
"Address not added";

}

}

}

catch(error){

showPopup(
"Error",
error.message
);

}

}


);


editBtn.onclick=()=>{

window.location=
"edit-profile.html";

};


logoutBtn.onclick=()=>{

showPopup(

"Logout",

"Are you sure you want to logout?",

true

);

};

</script>

</body>
</html>

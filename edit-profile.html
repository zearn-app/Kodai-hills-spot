<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Edit Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f4f3;
padding:20px;
min-height:100vh;
animation:fadeBody .8s ease;
}

/* Animations */

@keyframes fadeBody{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes cardShow{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

@keyframes popupShow{
from{
opacity:0;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1);
}
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* Card */

.card{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 5px 25px rgba(0,0,0,.1);
animation:cardShow .8s ease;
}

.heading{
font-size:26px;
font-weight:bold;
color:#2e7d32;
text-align:center;
margin-bottom:25px;
}

/* Inputs */

.input-box{
margin-top:15px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:15px;
outline:none;
font-size:15px;
transition:.4s;
}

input:focus{
border:2px solid #2e7d32;
transform:scale(1.02);
box-shadow:0 0 15px rgba(46,125,50,.2);
}


select{

width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:15px;
outline:none;
font-size:15px;
background:white;
transition:.4s;

}

select:focus{

border:2px solid #2e7d32;
transform:scale(1.02);
box-shadow:0 0 15px rgba(46,125,50,.2);

}
/* Buttons */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-top:20px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:translateY(-3px);
}

.btn:active{
transform:scale(.95);
}

.save{
background:#2e7d32;
color:white;
}

.back{
background:#777;
color:white;
}

/* Loader */

.loader{

width:20px;
height:20px;

border:3px solid white;
border-top:3px solid transparent;

border-radius:50%;

display:inline-block;

animation:spin .7s linear infinite;
}

/* Popup */

.popup-container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.5);

z-index:9999;
}

.popup{

background:white;

width:300px;

padding:25px;

border-radius:25px;

text-align:center;

animation:popupShow .3s;
}

.popup img{

width:80px;
height:80px;

margin-bottom:15px;
}

.popup h2{

margin-bottom:10px;
color:#2e7d32;
}

.popup p{

color:#666;
margin-bottom:20px;
}

.popup button{

padding:12px 30px;

border:none;
border-radius:10px;

background:#2e7d32;
color:white;

cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="heading">

✏️ Edit Profile

</div>

<div class="input-box">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="input-box">
<label>Phone</label>
<input type="number" id="phone">
</div>

<div class="input-box">
<label>Street</label>
<input type="text" id="street">
</div>

<div class="input-box">
<label>Area</label>
<input type="text" id="area">
</div>

<div class="input-box">

<label>State</label>

<select id="state">

<option value="">
Select State
</option>

<option value="Tamil Nadu">
Tamil Nadu
</option>

<option value="Kerala">
Kerala
</option>

<option value="Karnataka">
Karnataka
</option>

<option value="Andhra Pradesh">
Andhra Pradesh
</option>

<option value="Telangana">
Telangana
</option>

</select>

</div>


<div class="input-box">

<label>District</label>

<select id="district">

<option value="">
Select District
</option>

</select>

</div>

<div class="input-box">
<label>Pincode</label>
<input type="number" id="pincode">
</div>

<button
class="btn save"
id="saveBtn">

💾 Save Profile

</button>

<button
class="btn back"
onclick="window.location='profile.html'">

⬅ Back

</button>

</div>


<!-- Popup -->

<div
id="popupBox"
class="popup-container">

<div class="popup">

<img
id="popupImg"
src="logo.png">

<h2
id="popupTitle">

</h2>

<p
id="popupMessage">

</p>

<button
onclick="closePopup()">

OK

</button>

</div>

</div>


<script type="module">

import {db,auth}
from "./js/firebase.js";

import {

doc,
getDoc,
updateDoc

}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {

onAuthStateChanged

}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const nameEl=
document.getElementById("name");

const phoneEl=
document.getElementById("phone");

const streetEl=
document.getElementById("street");

const areaEl=
document.getElementById("area");

const districtEl=
document.getElementById("district");

const stateEl=
document.getElementById("state");




const districtData = {

],

],

],

],

],

],

],

"Uttar Pradesh":[

],


// WEST INDIA

],

],

"North Goa","South Goa"
],

"Rajasthan":[

],


// CENTRAL INDIA

"Madhya Pradesh":[

],

"Chhattisgarh":[

],


// EAST INDIA

"West Bengal":[
"Kolkata","Howrah","Darjeeling",

],

],

],

],

],

],

],

],

],

],

],

"Tripura":[

],


// UNION TERRITORIES

"Andaman and Nicobar Islands":[
"Port Blair","Nicobar"
],

"Chandigarh":[
"Chandigarh"
],

"Dadra and Nagar Haveli and Daman and Diu":[
"Daman","Diu","Silvassa"
],

"Lakshadweep":[
"Kavaratti","Agatti"
],

"Puducherry":[
"Puducherry","Karaikal","Mahe","Yanam"
]

};

stateEl.onchange=()=>{

districtEl.innerHTML=
'<option value="">Select District</option>';

const districts=
districtData[stateEl.value];

if(districts){

districts.forEach(item=>{

const option=
document.createElement("option");

option.value=item;

option.innerText=item;

districtEl.appendChild(option);

});

}

};
const pincodeEl=
document.getElementById("pincode");

const saveBtn=
document.getElementById("saveBtn");

let currentUser;


/* Popup */

function showPopup(
title,
message,
type="success"
){

document.getElementById(
"popupTitle"
).innerText=
title;

document.getElementById(
"popupMessage"
).innerText=
message;

document.getElementById(
"popupImg"
).src=

type==="success"

?

"https://cdn-icons-png.flaticon.com/512/845/845646.png"

:

"https://cdn-icons-png.flaticon.com/512/1828/1828843.png";


document.getElementById(
"popupBox"
).style.display=
"flex";

}

window.closePopup=()=>{

document.getElementById(
"popupBox"
).style.display=
"none";

};


/* Load User */

onAuthStateChanged(

auth,

async(user)=>{

if(!user){

window.location=
"login.html";

return;

}

currentUser=user;

try{

const userRef=
doc(
db,
"Users",
user.uid
);

const snapshot=
await getDoc(
userRef
);

if(snapshot.exists()){

const data=
snapshot.data();

nameEl.value=
data.name || "";

phoneEl.value=
data.phone || "";

if(data.address){

streetEl.value=
data.address.street || "";

areaEl.value=
data.address.area || "";



data.address.state

pincodeEl.value=
data.address.pincode || "";

}

}

}catch(error){

showPopup(
"Error",
error.message,
"error"
);

}

});


/* Save */

saveBtn.onclick=

async()=>{

try{

if(

!nameEl.value ||
!phoneEl.value

){

showPopup(
"Missing",
"Please fill required fields",
"error"
);

return;

}

saveBtn.innerHTML=

'<span class="loader"></span>';

saveBtn.disabled=true;


const userRef=

doc(
db,
"Users",
currentUser.uid
);

await updateDoc(

userRef,

{

name:
nameEl.value,

phone:
phoneEl.value,

address:{

street:
streetEl.value,

area:
areaEl.value,

district:
districtEl.value,

state:
stateEl.value,

pincode:
pincodeEl.value

}

}

);

showPopup(
"Success",
"Profile Updated Successfully"
);

setTimeout(()=>{

window.location=
"profile.html";

},1500);

}

catch(error){

showPopup(
"Error",
error.message,
"error"
);

}

finally{

saveBtn.innerHTML=
"💾 Save Profile";

saveBtn.disabled=false;

}

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Users</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.navbar{

background:white;
padding:15px;
border-radius:15px;

display:flex;
align-items:center;
gap:10px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

margin-bottom:20px;

}

.logo{

width:50px;
height:50px;

border-radius:50%;

border:2px solid #2e7d32;

}

.title{

font-size:22px;
font-weight:bold;
color:#2e7d32;

}

.stats{

background:white;

padding:20px;

border-radius:15px;

margin-bottom:20px;

text-align:center;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.count{

font-size:35px;
color:#2e7d32;
font-weight:bold;

}

.search{

width:100%;
padding:15px;

border:none;
border-radius:12px;

margin-bottom:20px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

outline:none;

}

.user{

background:white;

padding:15px;

border-radius:15px;

margin-bottom:15px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.user h3{

color:#2e7d32;
margin-bottom:10px;

}

.info{

margin-top:8px;
color:#666;

}

.delete{

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:10px;

background:#e53935;

color:white;

}

</style>

</head>

<body>

<div class="navbar">

<img src="logo.png"
class="logo">

<div class="title">

Users Management

</div>

</div>


<div class="stats">

<div>

Total Users

</div>

<div
class="count"
id="totalUsers">

0

</div>

</div>


<input
class="search"
id="searchInput"

placeholder="🔍 Search users">


<div id="users">

Loading...

</div>


<script type="module"
src="js/srkxditit.js">

</script>

</body>

</html>

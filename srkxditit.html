<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Users</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.navbar{
background:white;
padding:15px;
border-radius:15px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.logo{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #2e7d32;
}

.title{
font-size:22px;
font-weight:bold;
color:#2e7d32;
}

.stats{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.count{
font-size:35px;
font-weight:bold;
color:#2e7d32;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:20px;
outline:none;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.user{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.user h3{
color:#2e7d32;
margin-bottom:10px;
}

.info{
margin-top:8px;
color:#555;
word-break:break-word;
}

.delete{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#e53935;
color:white;
cursor:pointer;
}

</style>

</head>

<body>


<div class="navbar">

<img
src="logo.png"
class="logo">

<div class="title">

Users Management

</div>

</div>


<div class="stats">

<div>Total Users</div>

<div
class="count"
id="totalUsers">

0

</div>

</div>


<input
class="search"
id="searchInput"
placeholder="🔍 Search users">


<div id="users">

Loading...

</div>


<script type="module">

import {auth,db}
from "./js/firebase.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


let allUsers=[];

const usersDiv=
document.getElementById("users");

const totalUsers=
document.getElementById("totalUsers");

const searchInput=
document.getElementById("searchInput");


onAuthStateChanged(

auth,

async(user)=>{

if(!user){

window.location=
"index.html";

return;

}


if(
user.email!==
"kodaihillsspot@gmail.com"
){

alert(
"Access Denied"
);

window.location=
"index.html";

return;

}

loadUsers();

}

);



async function loadUsers(){

try{

usersDiv.innerHTML=
"Loading...";


const snapshot=

await getDocs(

collection(
db,
"Users"
)

);


allUsers=[];


snapshot.forEach((docItem)=>{

allUsers.push({

id:docItem.id,

...docItem.data()

});

});


totalUsers.innerText=
allUsers.length;


showUsers();

}

catch(error){

console.log(error);

usersDiv.innerHTML=

"Failed loading users";

}

}



function showUsers(){

const search=

searchInput.value
.toLowerCase();

usersDiv.innerHTML="";


const filtered=

allUsers.filter(user=>{

const name=

(user.name||"")
.toLowerCase();

const email=

(user.email||"")
.toLowerCase();

return(

name.includes(search)

||

email.includes(search)

);

});


if(filtered.length===0){

usersDiv.innerHTML=`

<div class="user">

No users found

</div>

`;

return;

}


filtered.forEach((user)=>{


let address="-";


if(user.address){

address=`

${user.address.street||""},

${user.address.area||""},

${user.address.district||""},

${user.address.state||""}

-

${user.address.pincode||""}

`;

}


usersDiv.innerHTML+=`

<div class="user">

<h3>

${user.name||"No Name"}

</h3>

<div class="info">

📧 ${user.email||"-"}

</div>

<div class="info">

📱 ${user.phone||"-"}

</div>

<div class="info">

🏠 ${address}

</div>

<button
class="delete"
onclick="deleteUser('${user.id}')">

Delete User

</button>

</div>

`;

});

}



window.deleteUser=

async(id)=>{

const ok=

confirm(
"Delete User?"
);

if(!ok)
return;


try{

await deleteDoc(

doc(
db,
"Users",
id
)

);

loadUsers();

}

catch(error){

alert(
error.message
);

}

};


searchInput.oninput=
showUsers;

</script>

</body>
</html>

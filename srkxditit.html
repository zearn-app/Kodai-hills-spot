<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Users</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.navbar{
background:white;
padding:15px;
border-radius:15px;
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
width:50px;
height:50px;
border-radius:50%;
}

.title{
font-size:22px;
font-weight:bold;
color:#2e7d32;
}

.stats{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.count{
font-size:35px;
font-weight:bold;
color:#2e7d32;
}

.search{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.user{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.user h3{
color:#2e7d32;
margin-bottom:10px;
}

.info{
margin-top:6px;
color:#555;
}

.delete{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<img
src="logo.png"
class="logo">

<div class="title">
Users Management
</div>

</div>


<div class="stats">

<div>Total Users</div>

<div
class="count"
id="totalUsers">
0
</div>

</div>


<input
id="searchInput"
class="search"
placeholder="🔍 Search Users">


<div id="users">

Loading Users...

</div>


<script
type="module"
src="./js/srkxditit.js">
</script>

</body>
</html>

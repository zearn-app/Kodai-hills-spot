<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Kodai Hills Spot Users</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.navbar{

background:white;
padding:15px;
border-radius:15px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;

}

.logo{

width:50px;
height:50px;
border-radius:50%;
border:2px solid #2e7d32;

}

.title{

font-size:22px;
font-weight:bold;
color:#2e7d32;

}

.stats{

background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.count{

font-size:35px;
font-weight:bold;
color:#2e7d32;

}

.search{

width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:20px;
outline:none;
box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.user{

background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.user h3{

color:#2e7d32;
margin-bottom:10px;

}

.info{

margin-top:8px;
color:#666;

}

.delete{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#e53935;
color:white;

}

</style>

</head>

<body>

<div class="navbar">

<img
src="logo.png"
class="logo">

<div class="title">

Users Management

</div>

</div>


<div class="stats">

<div>
Total Users
</div>

<div
class="count"
id="totalUsers">

0

</div>

</div>


<input
class="search"
id="searchInput"

placeholder="🔍 Search users">


<div id="Users">

Loading...

</div>


<script type="module">

import {auth,db}
from "./js/firebase.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


let allUsers=[];


/* Admin protection */

onAuthStateChanged(

auth,

async(user)=>{

if(!user){

window.location=
"index.html";

return;

}

if(
user.email!=="kodaihillsspot@gmail.com"
){

alert(
"Access Denied"
);

window.location=
"index.html";

return;

}

await loadUsers();

}

);



async function loadUsers(){

const usersDiv=
document.getElementById(
"users"
);

usersDiv.innerHTML=
"Loading...";


try{

const snapshot=

await getDocs(
collection(
db,
"Users"
)
);

allUsers=[];

snapshot.forEach((docItem)=>{

allUsers.push({

id:docItem.id,

...docItem.data()

});

});


document.getElementById(
"totalUsers"
).innerText=

allUsers.length;


showUsers();

}
catch(error){

usersDiv.innerHTML=

"Failed loading users";

console.log(error);

}

}



function showUsers(){

const search=

document.getElementById(
"searchInput"
)

.value.toLowerCase();

const usersDiv=

document.getElementById(
"users"
);

usersDiv.innerHTML="";


const filteredUsers=

allUsers.filter(user=>{

const name=
(user.name||"")
.toLowerCase();

const email=
(user.email||"")
.toLowerCase();

return name.includes(search)
||
email.includes(search);

});


if(filteredUsers.length===0){

usersDiv.innerHTML=`

<div class="user">

No users found

</div>

`;

return;

}


filteredUsers.forEach((user)=>{


let addressText="-";


if(user.address){

addressText=`

${user.address.street||""},

${user.address.area||""},

${user.address.district||""},

${user.address.state||""}

`;

}


usersDiv.innerHTML+=`

<div class="user">

<h3>

${user.name||"No Name"}

</h3>

<div class="info">

📧
${user.email||"-"}

</div>

<div class="info">

📱
${user.phone||"-"}

</div>

<div class="info">

🏠
${addressText}

</div>

<button
class="delete"
data-id="${user.id}">

Delete User

</button>

</div>

`;

});


document
.querySelectorAll(
".delete"
)

.forEach(btn=>{

btn.onclick=
async()=>{

const id=
btn.dataset.id;

const ok=

confirm(
"Delete user?"
);

if(!ok)
return;

await deleteDoc(

doc(
db,
"Users",
id
)

);

loadUsers();

};

});

}


document.getElementById(
"searchInput"
)

.oninput=
showUsers;

</script>

</body>

</html>

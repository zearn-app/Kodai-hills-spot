<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{display:none;background:#f0f4f0;padding:16px 16px 60px;}

#authLoader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#f0f4f0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;
}
.loader-spinner{width:32px;height:32px;border:3px solid #c8e6c9;border-top-color:#2e7d32;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:14px;color:#888;margin-top:10px;}

.navbar{background:white;padding:14px 16px;border-radius:16px;display:flex;align-items:center;gap:12px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.back-btn{background:#f0f4f0;border:none;border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:#2e7d32;font-weight:700;}
.navbar-title{font-size:17px;font-weight:700;color:#1a1a1a;}

.stats{background:white;border-radius:14px;padding:18px;text-align:center;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.stats p{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.stats h1{font-size:36px;font-weight:800;color:#2e7d32;}

.search{width:100%;padding:13px 14px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;outline:none;margin-bottom:16px;background:white;}
.search:focus{border-color:#2e7d32;}

.user-card{background:white;padding:14px;margin-bottom:12px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;}
.user-card h3{font-size:15px;font-weight:700;color:#2e7d32;margin-bottom:6px;}
.user-card .info{font-size:13px;color:#555;margin-bottom:3px;}
.user-card .uid{font-size:11px;color:#bbb;margin-top:4px;}
.del-btn{width:100%;padding:10px;margin-top:10px;background:red;color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}

.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:flex-end;z-index:999;}
.popup-overlay.open{display:flex;}
.popup-sheet{background:white;width:100%;max-height:92vh;overflow-y:auto;padding:20px;border-radius:24px 24px 0 0;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.sheet-close{float:right;font-size:22px;cursor:pointer;color:#aaa;background:none;border:none;}
.avatar{width:68px;height:68px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:28px;margin:8px auto 12px;}
.pop-name{text-align:center;font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
.pop-id{text-align:center;font-size:11px;color:#aaa;margin-bottom:18px;word-break:break-all;}
.detail-row{display:flex;align-items:center;gap:12px;padding:12px;background:#f8f8f8;border-radius:12px;margin-bottom:8px;}
.detail-icon{font-size:20px;flex-shrink:0;}
.detail-label{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.detail-value{font-size:14px;color:#1a1a1a;font-weight:600;word-break:break-all;}
.pop-del{width:100%;padding:13px;margin-top:16px;background:red;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div id="authLoader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Checking access…</div>
</div>

<nav class="navbar">
  <button class="back-btn" onclick="window.location='admin.html'">‹</button>
  <span class="navbar-title">Users</span>
</nav>

<div class="stats">
  <p>Total Users</p>
  <h1 id="totalUsers">—</h1>
</div>

<input class="search" id="searchInput" placeholder="🔍 Search users…">
<div id="users"><p style="color:#aaa;padding:10px;">Loading…</p></div>

<div class="popup-overlay" id="userPopup">
  <div class="popup-sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" id="popupClose">✕</button>
    <div class="avatar">👤</div>
    <div class="pop-name" id="popName"></div>
    <div class="pop-id"   id="popId"></div>
    <div class="detail-row"><div class="detail-icon">📧</div><div><div class="detail-label">Email</div><div class="detail-value" id="popEmail">—</div></div></div>
    <div class="detail-row"><div class="detail-icon">📱</div><div><div class="detail-label">Phone</div><div class="detail-value" id="popPhone">—</div></div></div>
    <div class="detail-row"><div class="detail-icon">🏠</div><div><div class="detail-label">Address</div><div class="detail-value" id="popAddress">—</div></div></div>
    <div class="detail-row"><div class="detail-icon">📅</div><div><div class="detail-label">Joined</div><div class="detail-value" id="popJoined">—</div></div></div>
    <button class="pop-del" id="popDeleteBtn">🗑️ Delete This User</button>
  </div>
</div>

<script type="module" src="js/srkxditit.js"></script>
</body>
</html>
